<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>InventorPath Flappy Game V8</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
    }
    body {
      margin: 0;
      overflow: hidden;
      background: #87ceeb;
      font-family: Arial, sans-serif;
      touch-action: none;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
    }
    canvas {
      display: block;
      margin: auto;
      width: 100vw;
      height: 100dvh;
      background: linear-gradient(#70c5ce, #ffffff);
    }
    .hud-panel {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      width: min(88vw, 340px);
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.16);
      touch-action: auto;
      pointer-events: auto;
    }
    .hud-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }
    .hud-row label {
      font-size: 13px;
      font-weight: 700;
      color: #111827;
      white-space: nowrap;
    }
    .hud-row input {
      flex: 1;
      font-size: 14px;
      padding: 7px 9px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      outline: none;
      min-width: 0;
    }
    .hud-row input:focus {
      border-color: #0284c7;
      box-shadow: 0 0 0 2px rgba(2, 132, 199, 0.2);
    }
    .hud-row select {
      flex: 1;
      font-size: 14px;
      padding: 7px 9px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      outline: none;
      min-width: 0;
      background: #ffffff;
    }
    .hud-row select:focus {
      border-color: #0284c7;
      box-shadow: 0 0 0 2px rgba(2, 132, 199, 0.2);
    }
    .sprite-hint {
      margin-top: -2px;
      margin-bottom: 8px;
      color: #475569;
      font-size: 11px;
      line-height: 1.2;
    }
    .score-list-title {
      font-size: 12px;
      font-weight: 700;
      color: #334155;
      margin-bottom: 6px;
    }
    .score-list {
      margin: 0;
      padding-left: 18px;
      max-height: min(35vh, 260px);
      overflow-y: auto;
      color: #111827;
      font-size: 12px;
    }
    .score-list li {
      margin: 0 0 4px;
      line-height: 1.25;
    }
    .hud-actions {
      margin-top: 10px;
    }
    .start-button {
      width: 100%;
      border: 0;
      border-radius: 10px;
      background: #0284c7;
      color: #ffffff;
      font-size: 14px;
      font-weight: 700;
      padding: 10px 12px;
      cursor: pointer;
    }
    .start-button:active {
      transform: translateY(1px);
    }
    .secondary-button {
      width: 100%;
      border: 1px solid #94a3b8;
      border-radius: 10px;
      background: #ffffff;
      color: #0f172a;
      font-size: 13px;
      font-weight: 700;
      padding: 9px 12px;
      cursor: pointer;
      margin-top: 6px;
    }
    .secondary-button:active {
      transform: translateY(1px);
    }
    .auth-status {
      font-size: 12px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 8px;
      line-height: 1.25;
    }
    .auth-note {
      color: #475569;
      font-size: 11px;
      line-height: 1.25;
      margin-bottom: 8px;
    }
    .game-over-actions {
      position: fixed;
      z-index: 15;
      display: none;
      gap: 10px;
      pointer-events: auto;
    }
    .game-over-actions button {
      flex: 1;
      border: 0;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      padding: 10px 12px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.22);
    }
    .game-over-actions .play-again-button {
      background: #0284c7;
      color: #ffffff;
    }
    .game-over-actions .logout-gameover-button {
      background: #ffffff;
      color: #0f172a;
      border: 1px solid #94a3b8;
    }

  </style>
</head>
<body>
<div class="hud-panel" id="hudPanel">
  <div class="auth-status" id="authStatus">Sign in or create a player account.</div>
  <div class="auth-note" id="authNote"></div>
  <div class="hud-row" id="authUserRow">
    <label for="playerNameInput">User</label>
    <input id="playerNameInput" type="text" maxlength="20" placeholder="User name">
  </div>
  <div class="hud-row" id="authPassRow">
    <label for="passwordInput">Pass</label>
    <input id="passwordInput" type="password" maxlength="30" placeholder="Password">
  </div>
  <div class="hud-actions">
    <button class="secondary-button" id="createAccountButton" type="button">Create New User</button>
    <button class="secondary-button" id="loginButton" type="button">Log In</button>
    <button class="secondary-button" id="logoutButton" type="button" style="display:none;">Log Out</button>
    <button class="secondary-button" id="downloadScoreFileButton" type="button" style="display:none;">Download My Score File</button>
  </div>
  <div class="hud-row" id="spritePickerRow" style="display:none;">
    <label for="spritePicker">Bruce</label>
    <select id="spritePicker"></select>
  </div>
  <div class="sprite-hint" id="spriteHint" style="display:none;">Choose any PNG avatar. dog.svg unlocks for top scorer.</div>
  <div class="score-list-title" id="scoreListTitle">Recent scores</div>
  <ol class="score-list" id="scoreList"></ol>
  <div class="hud-actions">
    <button class="start-button" id="startGameButton" type="button">Start Game</button>
  </div>
</div>
<div class="game-over-actions" id="gameOverActions">
  <button class="logout-gameover-button" id="gameOverLogoutButton" type="button">Log Out</button>
  <button class="play-again-button" id="gameOverPlayAgainButton" type="button">Play Again</button>
</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const hudPanel = document.getElementById("hudPanel");
const gameOverActions = document.getElementById("gameOverActions");
const gameOverLogoutButton = document.getElementById("gameOverLogoutButton");
const gameOverPlayAgainButton = document.getElementById("gameOverPlayAgainButton");
const playerNameInput = document.getElementById("playerNameInput");
const spritePickerRow = document.getElementById("spritePickerRow");
const spritePicker = document.getElementById("spritePicker");
const spriteHint = document.getElementById("spriteHint");
const scoreList = document.getElementById("scoreList");
const scoreListTitle = document.getElementById("scoreListTitle");
const startGameButton = document.getElementById("startGameButton");
const passwordInput = document.getElementById("passwordInput");
const authStatus = document.getElementById("authStatus");
const authNote = document.getElementById("authNote");
const authUserRow = document.getElementById("authUserRow");
const authPassRow = document.getElementById("authPassRow");
const createAccountButton = document.getElementById("createAccountButton");
const loginButton = document.getElementById("loginButton");
const logoutButton = document.getElementById("logoutButton");
const downloadScoreFileButton = document.getElementById("downloadScoreFileButton");
const ctGantryImage = new Image();

const DEFAULT_DOG_SPRITE = "dog.svg";
const AVAILABLE_DOG_SPRITES = ["dog.svg", "bruce.png", "gooboybruce.PNG", "smileB.png"];
const PNG_DOG_SPRITES = AVAILABLE_DOG_SPRITES.filter(spriteName => spriteName.toLowerCase().endsWith(".png"));

// Version 2: preload all player sprites once and switch by name.
// This prevents iPhone/GitHub Pages timing/caching issues where the selector
// changed but the displayed Bruce image did not update reliably.
const spriteImages = {};
let currentSprite = DEFAULT_DOG_SPRITE;

AVAILABLE_DOG_SPRITES.forEach(spriteName => {
  const img = new Image();
  img.onload = () => {
    // Redraw immediately after a sprite finishes loading.
    draw();
  };
  img.onerror = () => {
    console.warn("Missing or failed sprite image:", spriteName);
  };
  img.src = spriteName;
  spriteImages[spriteName] = img;
});

ctGantryImage.src = "ct-gantry.svg";

const SCORE_HISTORY_KEY = "inventorpath_score_history";
const SPRITE_CHOICES_KEY = "inventorpath_sprite_choices";
const USER_ACCOUNTS_KEY = "inventorpath_user_accounts";
const ACTIVE_USER_KEY = "inventorpath_active_user";
const SCORE_FILE_PREFIX = "inventorpath_score_file_";
const TOP3_FOREVER_KEY = "inventorpath_top3_forever";
const PER_USER_TOP3_FOREVER_KEY = "inventorpath_per_user_top3_forever";
const DAILY_STATS_KEY = "inventorpath_daily_stats";
const LAST_RESET_DATE_KEY = "inventorpath_last_reset_date";
const INACTIVITY_DAYS = 14;
const MS_PER_DAY = 86400000;

let gameWidth = 0;
let gameHeight = 0;
let uiScale = 1;

let pipes = [];
let score = 0;
let gameStarted = false;
let gameOver = false;
let scoreSavedForRound = false;
let lastSavedEntry = null;
let totalPipesCreated = 0;
let mysteryBox = null;
let mysteryPlans = [];
let firstMysteryQueued = false;
let nextMysteryScoreThreshold = 22;
let activeEffect = null;
let speedMultiplier = 1;
let sizeMultiplier = 1;
let invincibleUntil = 0;
let godModeCharges = 0;
let lastRoundEffectLabel = "None";

function sanitizeName(name) {
  const trimmed = name.trim().replace(/\s+/g, " ");
  return trimmed.slice(0, 20);
}

function sanitizeUsername(name) {
  return sanitizeName(name).replace(/[^a-zA-Z0-9 _.-]/g, "");
}

function getUserKey(name) {
  return sanitizeUsername(name).toLowerCase();
}

function loadUserAccounts() {
  try {
    const raw = localStorage.getItem(USER_ACCOUNTS_KEY);
    const parsed = raw ? JSON.parse(raw) : {};
    if (!parsed || typeof parsed !== "object" || Array.isArray(parsed)) {
      return {};
    }
    return parsed;
  } catch {
    return {};
  }
}

function saveUserAccounts() {
  localStorage.setItem(USER_ACCOUNTS_KEY, JSON.stringify(userAccounts));
}

function getScoreFileKey(name) {
  return SCORE_FILE_PREFIX + getUserKey(name);
}

function getTopThreeScoresForUser(name) {
  return getScoresForPlayer(name).slice(0, 3);
}

function saveCurrentUserScoreFile() {
  if (!activeUserName) {
    return;
  }

  const scoreFile = {
    userName: playerName,
    updatedAt: new Date().toISOString(),
    top3Scores: getTopThreeScoresForUser(playerName).map(entry => ({
      score: entry.score,
      playedAt: entry.playedAt
    }))
  };

  localStorage.setItem(getScoreFileKey(playerName), JSON.stringify(scoreFile, null, 2));
}


function downloadCurrentUserScoreFile() {
  if (!activeUserName) {
    alert("Log in first.");
    return;
  }

  saveCurrentUserScoreFile();
  const raw = localStorage.getItem(getScoreFileKey(playerName)) || "{}";
  const blob = new Blob([raw], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = playerName.replace(/[^a-zA-Z0-9_-]/g, "_") + "_top3_scores.json";
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
}

function renderAuthStatus() {
  if (activeUserName) {
    authStatus.textContent = "Logged in as " + playerName;
    authNote.style.display = "none";
    authUserRow.style.display = "none";
    authPassRow.style.display = "none";
    loginButton.style.display = "none";
    createAccountButton.style.display = "none";
    logoutButton.style.display = "block";
    downloadScoreFileButton.style.display = "block";
    startGameButton.disabled = false;
    startGameButton.style.opacity = "1";
  } else {
    authStatus.textContent = "Sign in or create a player account.";
    authNote.style.display = "none";
    authUserRow.style.display = "flex";
    authPassRow.style.display = "flex";
    loginButton.style.display = "block";
    createAccountButton.style.display = "block";
    logoutButton.style.display = "none";
    downloadScoreFileButton.style.display = "none";
    startGameButton.disabled = true;
    startGameButton.style.opacity = "0.55";
  }
}

function createAccount() {
  const name = sanitizeUsername(playerNameInput.value);
  const password = passwordInput.value;
  const userKey = getUserKey(name);

  if (!name || !password) {
    alert("Enter a user name and password.");
    return;
  }

  if (userAccounts[userKey]) {
    alert("That user already exists. Use Log In instead.");
    return;
  }

  // Static HTML version: password is stored locally in this browser only.
  // This is not bank-level security, but it creates separate local player accounts.
  userAccounts[userKey] = {
    userName: name,
    password: password,
    createdAt: new Date().toISOString(),
    lastActivity: new Date().toISOString()
  };
  saveUserAccounts();

  activeUserName = name;
  playerName = name;
  localStorage.setItem(ACTIVE_USER_KEY, activeUserName);
  playerNameInput.value = playerName;
  passwordInput.value = "";
  saveCurrentUserScoreFile();
  renderScoreHistory();
  renderAuthStatus();
  applyCurrentPlayerSprite();
  updateHudVisibility();
}

function loginAccount() {
  const name = sanitizeUsername(playerNameInput.value);
  const password = passwordInput.value;
  const userKey = getUserKey(name);
  const account = userAccounts[userKey];

  if (!account || account.password !== password) {
    alert("Incorrect user name or password.");
    return;
  }

  account.lastActivity = new Date().toISOString();
  saveUserAccounts();
  activeUserName = account.userName;
  playerName = account.userName;
  localStorage.setItem(ACTIVE_USER_KEY, activeUserName);
  playerNameInput.value = playerName;
  passwordInput.value = "";
  renderScoreHistory();
  renderAuthStatus();
  applyCurrentPlayerSprite();
  updateHudVisibility();
}

function logoutAccount() {
  activeUserName = "";
  playerName = "Player";
  localStorage.removeItem(ACTIVE_USER_KEY);
  playerNameInput.value = "";
  passwordInput.value = "";
  gameStarted = false;
  gameOver = false;
  renderScoreHistory();
  renderAuthStatus();
  updateStartButtonLabel();
  updateHudVisibility();
}

function loadSpriteChoices() {
  try {
    const raw = localStorage.getItem(SPRITE_CHOICES_KEY);
    const parsed = raw ? JSON.parse(raw) : {};
    if (!parsed || typeof parsed !== "object" || Array.isArray(parsed)) {
      return {};
    }
    return parsed;
  } catch {
    return {};
  }
}

let userAccounts = loadUserAccounts();
let activeUserName = sanitizeUsername(localStorage.getItem(ACTIVE_USER_KEY) || "");
if (activeUserName && !userAccounts[getUserKey(activeUserName)]) {
  activeUserName = "";
  localStorage.removeItem(ACTIVE_USER_KEY);
}

let playerName = activeUserName || "Player";
let scoreHistory = [];
let spriteChoicesByUser = loadSpriteChoices();

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function setCanvasSize() {
  // Match iPhone's dynamic viewport height and render sharply on retina screens.
  gameWidth = window.innerWidth;
  gameHeight = window.innerHeight;

  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.style.width = gameWidth + "px";
  canvas.style.height = gameHeight + "px";
  canvas.width = Math.floor(gameWidth * dpr);
  canvas.height = Math.floor(gameHeight * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  uiScale = clamp(Math.min(gameWidth / 390, gameHeight / 844), 0.85, 1.2);
}

setCanvasSize();

let bird = {
  x: 0,
  y: gameHeight / 2,
  baseSize: 24,
  size: 24,
  velocity: 0,
  gravity: 0.45,
  jump: -8
};

bird.x = Math.max(70, Math.min(100, gameWidth * 0.2));

function recalculateBirdSize() {
  bird.size = Math.max(0, Math.round(bird.baseSize * sizeMultiplier));
}

function applyPhysicsTuning() {
  bird.baseSize = Math.round(clamp(gameWidth * 0.032, 20, 26));
  recalculateBirdSize();
  bird.gravity = clamp(0.4 + gameHeight / 5000, 0.42, 0.56);
  bird.jump = -clamp(7.6 + gameHeight / 980, 7.8, 8.9);
}

applyPhysicsTuning();

function formatPlayedAt(isoTime) {
  const date = new Date(isoTime);
  if (Number.isNaN(date.getTime())) {
    return "Unknown time";
  }
  return date.toLocaleString();
}

function formatPlayedAtShort(isoTime) {
  const date = new Date(isoTime);
  if (Number.isNaN(date.getTime())) {
    return "Unknown";
  }

  const datePart = date.toLocaleDateString();
  const timePart = date.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  return datePart + " " + timePart;
}

function normalizedName(name) {
  return sanitizeName(name).toLowerCase();
}

function getPlayedAtTime(entry) {
  const timeValue = new Date(entry.playedAt).getTime();
  return Number.isFinite(timeValue) ? timeValue : Number.MAX_SAFE_INTEGER;
}

function compareScoreEntries(a, b) {
  if (b.score !== a.score) {
    return b.score - a.score;
  }
  // Earlier timestamp wins tie-breaker for top scorer ranking.
  return getPlayedAtTime(a) - getPlayedAtTime(b);
}

function isValidScoreEntry(entry) {
  return entry &&
    typeof entry.name === "string" &&
    Number.isFinite(entry.score) &&
    typeof entry.playedAt === "string";
}

function getScoreEntryKey(entry) {
  return normalizedName(entry.name) + "|" + entry.score + "|" + entry.playedAt;
}

function mergeScoreEntries(...entryLists) {
  const seen = new Set();
  const merged = [];

  entryLists.flat().filter(isValidScoreEntry).forEach(entry => {
    const key = getScoreEntryKey(entry);
    if (!seen.has(key)) {
      seen.add(key);
      merged.push(entry);
    }
  });

  return merged.sort(compareScoreEntries);
}

function loadPerUserTop3Forever() {
  try {
    const raw = localStorage.getItem(PER_USER_TOP3_FOREVER_KEY);
    const parsed = raw ? JSON.parse(raw) : {};
    if (!parsed || typeof parsed !== "object" || Array.isArray(parsed)) {
      return {};
    }

    const cleaned = {};
    Object.keys(parsed).forEach(userKey => {
      const entries = Array.isArray(parsed[userKey]) ? parsed[userKey] : [];
      const ranked = mergeScoreEntries(entries).slice(0, 3);
      if (ranked.length > 0) {
        cleaned[userKey] = ranked;
      }
    });
    return cleaned;
  } catch {
    return {};
  }
}

function savePerUserTop3Forever(top3ByUser) {
  localStorage.setItem(PER_USER_TOP3_FOREVER_KEY, JSON.stringify(top3ByUser));
}

function updatePerUserTop3Forever() {
  const top3ByUser = loadPerUserTop3Forever();

  scoreHistory.filter(isValidScoreEntry).forEach(entry => {
    const userKey = normalizedName(entry.name);
    top3ByUser[userKey] = mergeScoreEntries(top3ByUser[userKey] || [], [entry]).slice(0, 3);
  });

  savePerUserTop3Forever(top3ByUser);
}

function getPermanentTopScoresForPlayer(name) {
  const top3ByUser = loadPerUserTop3Forever();
  return top3ByUser[normalizedName(name)] || [];
}

function getScoresForPlayer(name) {
  const nameKey = normalizedName(name);
  const currentScores = scoreHistory.filter(entry => normalizedName(entry.name) === nameKey);
  const permanentScores = getPermanentTopScoresForPlayer(name);
  return mergeScoreEntries(currentScores, permanentScores);
}

function getTopScores(limit) {
  return scoreHistory
    .slice()
    .sort(compareScoreEntries)
    .slice(0, limit);
}

function saveSpriteChoices() {
  localStorage.setItem(SPRITE_CHOICES_KEY, JSON.stringify(spriteChoicesByUser));
}

function isCurrentPlayerTopScorer() {
  const topEntry = getTopScores(1)[0];
  return Boolean(topEntry) && normalizedName(topEntry.name) === normalizedName(playerName);
}

function getAllowedSpritesForCurrentUser() {
  return isCurrentPlayerTopScorer() ? AVAILABLE_DOG_SPRITES : PNG_DOG_SPRITES;
}

function getDefaultSpriteForCurrentUser() {
  if (isCurrentPlayerTopScorer()) {
    return DEFAULT_DOG_SPRITE;
  }
  return PNG_DOG_SPRITES[0] || DEFAULT_DOG_SPRITE;
}

function refreshSpritePickerOptions() {
  const allowedSprites = getAllowedSpritesForCurrentUser();
  spritePicker.innerHTML = "";

  allowedSprites.forEach(spriteName => {
    const option = document.createElement("option");
    option.value = spriteName;
    option.textContent = spriteName;
    spritePicker.appendChild(option);
  });
}

function getCurrentPlayerSpriteChoice() {
  const storedChoice = spriteChoicesByUser[normalizedName(playerName)];
  const allowedSprites = getAllowedSpritesForCurrentUser();
  if (allowedSprites.includes(storedChoice)) {
    return storedChoice;
  }
  return getDefaultSpriteForCurrentUser();
}

function applyCurrentPlayerSprite() {
  if (!activeUserName) {
    currentSprite = DEFAULT_DOG_SPRITE;
    spritePickerRow.style.display = "none";
    spriteHint.style.display = "none";
    return;
  }

  refreshSpritePickerOptions();
  const chosen = getCurrentPlayerSpriteChoice();
  currentSprite = chosen;
  spritePicker.value = chosen;
  spritePickerRow.style.display = "flex";
  spriteHint.style.display = "block";

  if (isCurrentPlayerTopScorer()) {
    spriteHint.textContent = "Top scorer can use dog.svg or any PNG avatar.";
  } else {
    spriteHint.textContent = "Choose any PNG avatar. dog.svg unlocks for top scorer.";
  }
}

function getPipeSpeedMultiplier() {
  return speedMultiplier;
}

function clearTimedEffect() {
  // Clears only the regular mystery effect. God Mode is now stackable
  // and stored separately as one or more death-shield charges.
  activeEffect = null;
  speedMultiplier = 1;
  sizeMultiplier = 1;
  recalculateBirdSize();
}

function rememberRoundEffect(label) {
  lastRoundEffectLabel = label;
}

function addGodModeCharge() {
  godModeCharges += 1;
  rememberRoundEffect("God Mode Ready");
}

function activateGodModeShield(durationMs) {
  if (godModeCharges <= 0) {
    return false;
  }

  godModeCharges -= 1;
  invincibleUntil = Date.now() + durationMs;
  rememberRoundEffect("God Mode Activated");
  return true;
}

function hasGodModeActive() {
  return Date.now() < invincibleUntil;
}

function tryActivateGodModeShield() {
  if (hasGodModeActive()) {
    return true;
  }
  return activateGodModeShield(2000);
}

function applyMysteryEffect() {
  const roll = Math.random();
  const now = Date.now();
  const bucket = 0.238;

  if (roll < bucket) {
    // Tiny effect: 33% smaller than normal for 15s.
    // This can stack with saved or active God Mode.
    clearTimedEffect();
    sizeMultiplier = 0.67;
    recalculateBirdSize();
    activeEffect = { type: "tiny", expiresAt: now + 15000 };
    rememberRoundEffect("Tiny");
    return;
  }

  if (roll < bucket * 2) {
    clearTimedEffect();
    sizeMultiplier = 1.5;
    recalculateBirdSize();
    activeEffect = { type: "large", expiresAt: now + 15000 };
    rememberRoundEffect("Large");
    return;
  }

  if (roll < bucket * 3) {
    clearTimedEffect();
    speedMultiplier = 0.5;
    activeEffect = { type: "slow", expiresAt: now + 15000 };
    rememberRoundEffect("Slow Pipes");
    return;
  }

  if (roll < bucket * 4) {
    clearTimedEffect();
    speedMultiplier = 1.3;
    activeEffect = { type: "fast", expiresAt: now + 15000 };
    rememberRoundEffect("Fast Pipes");
    return;
  }

  // Mystery-box God Mode adds a saved death shield.
  // It does not turn on immediately and does not erase Tiny/Large/Slow/Fast.
  addGodModeCharge();
}

function maybeExpireEffect() {
  if (activeEffect && Date.now() >= activeEffect.expiresAt) {
    clearTimedEffect();
  }
}

function queueMysteryPlan(targetPipeId) {
  mysteryPlans.push({
    targetPipeId
  });
}

function maybeQueueMysteryPlans() {
  if (!firstMysteryQueued && score >= 15) {
    // Score 15 milestone: place between columns 18 and 19.
    queueMysteryPlan(19);
    firstMysteryQueued = true;
  }

  while (firstMysteryQueued && score >= nextMysteryScoreThreshold) {
    // For score 22 and every +7 after, deploy after column (score + 3).
    const anchorColumn = nextMysteryScoreThreshold + 3;
    queueMysteryPlan(anchorColumn + 1);
    nextMysteryScoreThreshold += 7;
  }
}

function getActiveEffectLabel() {
  const labels = [];

  if (hasGodModeActive()) {
    const remainingSeconds = Math.max(0, Math.ceil((invincibleUntil - Date.now()) / 1000));
    labels.push("God Mode Active " + remainingSeconds + "s");
  }

  if (godModeCharges > 0) {
    labels.push("God Ready x" + godModeCharges);
  }

  if (activeEffect) {
    const effectLabels = {
      tiny: "Tiny",
      large: "Large",
      slow: "Slow Pipes",
      fast: "Fast Pipes"
    };
    labels.push(effectLabels[activeEffect.type] || "Active");
  }

  if (labels.length > 0) {
    return labels.join(" + ");
  }

  if (lastRoundEffectLabel && lastRoundEffectLabel !== "None") {
    return lastRoundEffectLabel;
  }

  return "None";
}

function spawnMysteryBoxAt(x, y) {
  mysteryBox = {
    x,
    y,
    size: Math.round(clamp(34 * uiScale, 28, 42)),
    active: true
  };
}

function maybeSpawnMysteryBoxFromPlans() {
  if (mysteryBox && mysteryBox.active) {
    return;
  }

  if (mysteryPlans.length === 0) {
    return;
  }

  const plan = mysteryPlans[0];
  const leftPipe = pipes.find(pipe => pipe.id === plan.targetPipeId - 1);
  const rightPipe = pipes.find(pipe => pipe.id === plan.targetPipeId);

  if (leftPipe && rightPipe) {
    const centerX = (leftPipe.x + leftPipe.width + rightPipe.x) * 0.5;
    const leftGapCenterY = (leftPipe.top + leftPipe.bottom) * 0.5;
    const rightGapCenterY = (rightPipe.top + rightPipe.bottom) * 0.5;
    const centerY = (leftGapCenterY + rightGapCenterY) * 0.5;
    spawnMysteryBoxAt(centerX, centerY);
    mysteryPlans.shift();
    return;
  }

  // Fallback if anchored columns have already passed the viewport.
  if (pipes.length > 0 && pipes[0].id > plan.targetPipeId) {
    const fallbackPipe = pipes[0];
    const centerY = (fallbackPipe.top + fallbackPipe.bottom) * 0.5;
    spawnMysteryBoxAt(gameWidth * 0.56, centerY);
    mysteryPlans.shift();
  }
}

function maybeCollectMysteryBox() {
  if (!mysteryBox || !mysteryBox.active) {
    return;
  }

  const half = mysteryBox.size / 2;
  const withinX = bird.x + bird.size > mysteryBox.x - half && bird.x - bird.size < mysteryBox.x + half;
  const withinY = bird.y + bird.size > mysteryBox.y - half && bird.y - bird.size < mysteryBox.y + half;
  if (withinX && withinY) {
    mysteryBox.active = false;
    applyMysteryEffect();
  }
}

function getBottomColumnLabel() {
  const topEntry = getTopScores(1)[0];
  if (!topEntry || typeof topEntry.name !== "string") {
    return "DOO";
  }

  const winner = normalizedName(topEntry.name);
  if (winner === "chubson") {
    return "SON";
  }
  if (winner === "chubdoo") {
    return "DOO";
  }
  return "DOO";
}

function loadTop3Forever() {

    const raw = localStorage.getItem(TOP3_FOREVER_KEY);
    const parsed = raw ? JSON.parse(raw) : [];
    if (!Array.isArray(parsed)) return [];
    return mergeScoreEntries(parsed).slice(0, 3);
  } catch {
    return [];
  }
}

function saveTop3Forever(entries) {
  localStorage.setItem(TOP3_FOREVER_KEY, JSON.stringify(entries));
}

function loadScoreHistory() {
  try {
    const raw = localStorage.getItem(SCORE_HISTORY_KEY);
    const parsed = raw ? JSON.parse(raw) : [];
    if (!Array.isArray(parsed)) {
      return [];
    }

    const entries = parsed.filter(isValidScoreEntry).slice(0, 100);

    // Re-merge global top-3 forever so those records survive daily resets.
    return mergeScoreEntries(entries, loadTop3Forever()).slice(0, 100);
  } catch {
    return [];
  }
}

function purgeInactiveAccounts() {
  const now = Date.now();
  let changed = false;

  Object.keys(userAccounts).forEach(key => {
    const account = userAccounts[key];
    const activityIso = account.lastActivity || account.createdAt;
    if (!activityIso) return;
    const activityTime = new Date(activityIso).getTime();
    if (!Number.isFinite(activityTime)) return;
    if ((now - activityTime) / MS_PER_DAY > INACTIVITY_DAYS) {
      const userKey = normalizedName(account.userName);
      scoreHistory = scoreHistory.filter(entry => normalizedName(entry.name) !== userKey);
      localStorage.removeItem(getScoreFileKey(account.userName));
      delete spriteChoicesByUser[userKey];
      delete userAccounts[key];
      changed = true;
    }
  });

  if (changed) {
    saveUserAccounts();
    saveSpriteChoices();
    // Write purged history, then reload to re-merge top-3-forever records.
    localStorage.setItem(SCORE_HISTORY_KEY, JSON.stringify(scoreHistory.slice(0, 100)));
    scoreHistory = loadScoreHistory();
  }
}

// ── Daily date helpers ────────────────────────────────────────────────────────

function getDayString(date) {
  const d = date || new Date();
  return d.getFullYear() + "-" +
    String(d.getMonth() + 1).padStart(2, "0") + "-" +
    String(d.getDate()).padStart(2, "0");
}

// ── Daily activity stats (per-user database stored in localStorage) ───────────

function loadDailyStats() {
  try {
    const raw = localStorage.getItem(DAILY_STATS_KEY);
    const parsed = raw ? JSON.parse(raw) : {};
    if (!parsed || typeof parsed !== "object" || Array.isArray(parsed)) return {};
    return parsed;
  } catch {
    return {};
  }
}

function saveDailyStats(stats) {
  // Retain only the most recent 30 days to keep storage lean.
  const days = Object.keys(stats).sort();
  if (days.length > 30) {
    days.slice(0, days.length - 30).forEach(day => delete stats[day]);
  }
  localStorage.setItem(DAILY_STATS_KEY, JSON.stringify(stats));
}

function recordDailyActivity(name, roundScore) {
  const stats = loadDailyStats();
  const today = getDayString();
  const userKey = normalizedName(name);
  if (!stats[today]) stats[today] = {};
  if (!stats[today][userKey]) {
    stats[today][userKey] = { userName: name, gamesPlayed: 0, highScore: 0, totalScore: 0 };
  }
  const entry = stats[today][userKey];
  entry.gamesPlayed += 1;
  entry.totalScore += roundScore;
  if (roundScore > entry.highScore) entry.highScore = roundScore;
  entry.userName = name;
  saveDailyStats(stats);
}

function getTodayStatsForPlayer(name) {
  const stats = loadDailyStats();
  const today = getDayString();
  return (stats[today] && stats[today][normalizedName(name)]) || null;
}

// ── Midnight score reset ──────────────────────────────────────────────────────

function maybeResetScoresNightly() {
  const today = getDayString();
  const lastReset = localStorage.getItem(LAST_RESET_DATE_KEY) || "";
  if (lastReset !== today) {
    // Clear the daily score list only. Global top 3 and each user's permanent
    // top 3 stay saved in separate localStorage records.
    localStorage.setItem(SCORE_HISTORY_KEY, JSON.stringify([]));
    scoreHistory = loadScoreHistory();
    localStorage.setItem(LAST_RESET_DATE_KEY, today);
    saveCurrentUserScoreFile();
    renderScoreHistory();
  }
  // Schedule next check 5 s after the next calendar midnight.
  const now = new Date();
  const nextMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 5);
  setTimeout(maybeResetScoresNightly, nextMidnight.getTime() - now.getTime());
}

function flap() {

    return;
  }

  // Keep taps responsive without stacking overly strong upward boosts.

}

window.addEventListener("resize", () => {
  setCanvasSize();
  applyPhysicsTuning();

  // Keep bird position valid after iPhone orientation changes.
  bird.x = Math.max(70, Math.min(100, gameWidth * 0.2));
  bird.y = Math.max(bird.size, Math.min(gameHeight - bird.size, bird.y));

  pipes = pipes
    .map(pipe => ({
      ...pipe,
      top: Math.max(40, Math.min(gameHeight - 210, pipe.top)),
      bottom: Math.max(160, Math.min(gameHeight - 40, pipe.bottom))
    }))
    .filter(pipe => pipe.bottom - pipe.top >= 144);
});

function createPipe() {
  const difficulty = Math.min(score, 30);
  const baseGap = Math.max(158, Math.min(228, Math.floor(gameHeight * 0.288)));
  // At 50 pts reduce by 4%; at 100+ pts reduce a further 5% for every additional 50 pts.
  const gapFactor = score >= 50
    ? 0.96 * Math.pow(0.95, Math.floor((score - 50) / 50))
    : 1.0;
  const gap = Math.max(142, baseGap - difficulty) * 1.32 * gapFactor;
  const margin = Math.max(50, Math.floor(gameHeight * 0.1));
  const maxTop = Math.max(margin + 1, gameHeight - gap - margin);
  const topHeight = Math.random() * (maxTop - margin) + margin;

  totalPipesCreated += 1;
  pipes.push({
    id: totalPipesCreated,
    x: gameWidth,
    width: 85.5,
    top: topHeight,
    bottom: topHeight + gap,
    passed: false
  });
}

function update() {
  if (!gameStarted || gameOver) return;

  maybeExpireEffect();
  maybeQueueMysteryPlans();
  maybeSpawnMysteryBoxFromPlans();

  const difficulty = Math.min(score, 30);
  const scoreSpeedMultiplier = Math.pow(1.02, Math.floor(score / 25));
  const pipeSpeed = (2.7 + difficulty * 0.03) * 0.7 * getPipeSpeedMultiplier() * scoreSpeedMultiplier;
  const spawnSpacing = Math.max(200, 280 - difficulty * 2);

  bird.velocity += bird.gravity;
  bird.y += bird.velocity;

  if (pipes.length === 0 || pipes[pipes.length - 1].x < gameWidth - spawnSpacing) {
    createPipe();
  }

  pipes.forEach(pipe => {
    pipe.x -= pipeSpeed;

    if (!pipe.passed && pipe.x + pipe.width < bird.x) {
      score++;
      pipe.passed = true;
    }

    if (
      !hasGodModeActive() &&
      bird.x + bird.size > pipe.x &&
      bird.x - bird.size < pipe.x + pipe.width &&
      (bird.y - bird.size < pipe.top || bird.y + bird.size > pipe.bottom)
    ) {
      if (!tryActivateGodModeShield()) {
        setGameOver();
      }
    }
  });

  pipes = pipes.filter(pipe => pipe.x + pipe.width > 0);

  if (mysteryBox && mysteryBox.active) {
    mysteryBox.x -= pipeSpeed;
    if (mysteryBox.x + mysteryBox.size < 0) {
      mysteryBox.active = false;
    } else {
      maybeCollectMysteryBox();
    }
  }

  if (bird.y + bird.size > gameHeight || bird.y - bird.size < 0) {
    if (hasGodModeActive()) {
      bird.y = clamp(bird.y, bird.size, gameHeight - bird.size);
      bird.velocity = 0;
    } else if (tryActivateGodModeShield()) {
      bird.y = clamp(bird.y, bird.size, gameHeight - bird.size);
      bird.velocity = 0;
    } else {
      setGameOver();
    }
  }
}

function drawColumnLabel(text, x, y, width, height) {
  if (height < 36) {
    return;
  }

  const fontFamily = "Impact, Arial Black, sans-serif";
  const maxTextWidth = width * 0.88;
  const maxTextHeight = height * 0.35;
  let fontSize = Math.floor(clamp(Math.min(width * 0.62, maxTextHeight), 16, 56));

  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillStyle = "#0f172a";

  // Shrink until the label fits the column width.
  while (fontSize > 12) {
    ctx.font = "900 " + fontSize + "px " + fontFamily;
    if (ctx.measureText(text).width <= maxTextWidth) {
      break;
    }
    fontSize -= 1;
  }

  ctx.fillText(text, x + width / 2, y + height / 2);
  ctx.textAlign = "left";
  ctx.textBaseline = "alphabetic";
}

function seededNoise(value) {
  const s = Math.sin(value) * 10000;
  return s - Math.floor(s);
}

function drawElectricity(pipe, timeMs) {
  const startY = pipe.top + 2;
  const endY = pipe.bottom - 2;
  const gapHeight = endY - startY;
  if (gapHeight < 28) {
    return;
  }

  const arcCount = 3;
  const segmentCount = 7;

  for (let i = 0; i < arcCount; i += 1) {
    const anchorX = pipe.x + pipe.width * (0.2 + i * 0.3);
    const phase = timeMs * 0.013 + pipe.x * 0.04 + i * 11;
    const jitter = pipe.width * 0.22;
    const flicker = 0.55 + 0.45 * Math.sin(phase * 1.9);

    ctx.beginPath();
    ctx.moveTo(anchorX, startY);

    for (let step = 1; step < segmentCount; step += 1) {
      const t = step / segmentCount;
      const y = startY + gapHeight * t;
      const xJitter = (seededNoise(phase + step * 2.17) - 0.5) * jitter;
      ctx.lineTo(anchorX + xJitter, y);
    }

    ctx.lineTo(anchorX, endY);

    ctx.save();
    ctx.strokeStyle = "rgba(57, 255, 20, " + (0.35 + flicker * 0.35) + ")";
    ctx.lineWidth = 6;
    ctx.shadowColor = "rgba(57, 255, 20, 0.95)";
    ctx.shadowBlur = 14;
    ctx.stroke();

    ctx.strokeStyle = "rgba(200, 255, 120, " + (0.72 + flicker * 0.28) + ")";
    ctx.lineWidth = 2;
    ctx.shadowBlur = 0;
    ctx.stroke();
    ctx.restore();
  }
}

function getFibonacciLevel() {
  return Math.floor(score / 10);
}

function drawFibonacciPattern(pipe, y, height, timeMs, sectionOffset) {
  const level = getFibonacciLevel();
  if (level < 1 || height < 70) {
    return;
  }

  // Every 10 points, a new deterministic-random Fibonacci pattern appears
  // in selected columns. The selected columns change each 10-point level.
  const patternSeed = pipe.id * 31 + level * 17 + sectionOffset;
  if (seededNoise(patternSeed) < 0.38) {
    return;
  }

  const fib = [1, 1, 2, 3, 5, 8, 13, 21];
  const cx = pipe.x + pipe.width / 2;
  const availableHeight = Math.max(40, height - 24);
  const topY = y + 12;
  const pulse = 0.5 + 0.5 * Math.sin(timeMs * 0.004 + patternSeed);

  ctx.save();
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  fib.forEach((value, index) => {
    const t = index / (fib.length - 1);
    const dotY = topY + availableHeight * t;
    const waveX = Math.sin(t * Math.PI * 3 + patternSeed) * pipe.width * 0.22;
    const radius = clamp(value * 0.55 * uiScale, 2.5, 11);

    ctx.beginPath();
    ctx.fillStyle = "rgba(57, 255, 20, " + (0.22 + pulse * 0.16) + ")";
    ctx.arc(cx + waveX, dotY, radius, 0, Math.PI * 2);
    ctx.fill();

    ctx.font = "700 " + Math.round(clamp(9 * uiScale, 8, 12)) + "px Arial";
    ctx.fillStyle = "rgba(15, 23, 42, 0.75)";
    ctx.fillText(String(value), cx + waveX, dotY);
  });

  ctx.strokeStyle = "rgba(57, 255, 20, 0.4)";
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  fib.forEach((value, index) => {
    const t = index / (fib.length - 1);
    const dotY = topY + availableHeight * t;
    const waveX = Math.sin(t * Math.PI * 3 + patternSeed) * pipe.width * 0.22;
    if (index === 0) {
      ctx.moveTo(cx + waveX, dotY);
    } else {
      ctx.lineTo(cx + waveX, dotY);
    }
  });
  ctx.stroke();
  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, gameWidth, gameHeight);
  const nowMs = performance.now();
  const bottomColumnLabel = getBottomColumnLabel();

  // Pipes
  pipes.forEach(pipe => {
    const gantryHeight = Math.round(clamp(74 * uiScale, 64, 96));

    // Column bodies styled as CT machine structures.
    ctx.fillStyle = "#cbd5e1";
    ctx.fillRect(pipe.x, 0, pipe.width, pipe.top);
    ctx.fillRect(pipe.x, pipe.bottom, pipe.width, gameHeight - pipe.bottom);

    ctx.fillStyle = "#94a3b8";
    ctx.fillRect(pipe.x, pipe.top - 8, pipe.width, 8);
    ctx.fillRect(pipe.x, pipe.bottom, pipe.width, 8);

    drawColumnLabel("CHUB", pipe.x, 0, pipe.width, pipe.top);
    drawColumnLabel(bottomColumnLabel, pipe.x, pipe.bottom, pipe.width, gameHeight - pipe.bottom);
    drawFibonacciPattern(pipe, 0, pipe.top, nowMs, 0);
    drawFibonacciPattern(pipe, pipe.bottom, gameHeight - pipe.bottom, nowMs, 1000);

    // Gantry openings at the edge of the playable gap.
    const topGantryY = pipe.top - gantryHeight;
    const bottomGantryY = pipe.bottom;

    if (ctGantryImage.complete && ctGantryImage.naturalWidth > 0) {
      ctx.drawImage(ctGantryImage, pipe.x, topGantryY, pipe.width, gantryHeight);
      ctx.drawImage(ctGantryImage, pipe.x, bottomGantryY, pipe.width, gantryHeight);
    } else {
      ctx.fillStyle = "#64748b";
      ctx.fillRect(pipe.x, topGantryY, pipe.width, gantryHeight);
      ctx.fillRect(pipe.x, bottomGantryY, pipe.width, gantryHeight);

      ctx.fillStyle = "#e2e8f0";
      ctx.fillRect(pipe.x + pipe.width * 0.2, topGantryY + gantryHeight * 0.3, pipe.width * 0.6, gantryHeight * 0.4);
      ctx.fillRect(pipe.x + pipe.width * 0.2, bottomGantryY + gantryHeight * 0.3, pipe.width * 0.6, gantryHeight * 0.4);
    }

    drawElectricity(pipe, nowMs);
  });

  if (mysteryBox && mysteryBox.active) {
    const size = mysteryBox.size;
    const half = size / 2;
    const x = mysteryBox.x - half;
    const y = mysteryBox.y - half;

    ctx.fillStyle = "#f59e0b";
    ctx.fillRect(x, y, size, size);
    ctx.strokeStyle = "#7c2d12";
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y, size, size);

    ctx.fillStyle = "#111827";
    ctx.font = "900 " + Math.round(size * 0.7) + "px Impact, Arial Black, sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("?", mysteryBox.x, mysteryBox.y + 1);
    ctx.textAlign = "left";
    ctx.textBaseline = "alphabetic";
  }

  // Player character (dog image when available, fallback to circle while loading).
  const spriteSize = bird.size * 2;
  const spriteX = bird.x - bird.size;
  const spriteY = bird.y - bird.size;

  const activeSpriteImage = spriteImages[currentSprite] || spriteImages[DEFAULT_DOG_SPRITE];

  if (activeSpriteImage && activeSpriteImage.complete && activeSpriteImage.naturalWidth > 0) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(bird.x, bird.y, bird.size, 0, Math.PI * 2);
    ctx.clip();
    ctx.drawImage(activeSpriteImage, spriteX, spriteY, spriteSize, spriteSize);
    ctx.restore();
  } else {
    ctx.fillStyle = "#facc15";
    ctx.beginPath();
    ctx.arc(bird.x, bird.y, bird.size, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#000";
    ctx.beginPath();
    ctx.arc(bird.x + 8, bird.y - 7, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  // Score
  const scoreFont = Math.round(clamp(34 * uiScale, 28, 42));
  const hudX = Math.round(clamp(22 * uiScale, 18, 32));
  const hudY = Math.round(clamp(56 * uiScale, 46, 70));

  ctx.fillStyle = "#111827";
  const playerLabel = (playerName || "Player") + ":";
  const nameFont = Math.round(clamp(20 * uiScale, 16, 26));
  ctx.font = "bold " + nameFont + "px Arial";
  ctx.fillText(playerLabel, hudX, hudY);

  const scoreX = hudX + ctx.measureText(playerLabel).width + Math.round(10 * uiScale);
  ctx.font = "bold " + scoreFont + "px Arial";
  ctx.fillText(score, scoreX, hudY);

  const effectFont = Math.round(clamp(16 * uiScale, 13, 20));
  const effectY = hudY + Math.round(clamp(24 * uiScale, 20, 30));
  ctx.font = "700 " + effectFont + "px Arial";
  ctx.fillText("Effect: " + getActiveEffectLabel(), hudX, effectY);

  if (gameOver) {
    const titleFont = Math.round(clamp(42 * uiScale, 32, 50));
    const bodyFont = Math.round(clamp(24 * uiScale, 19, 30));
    const subTextFont = Math.round(clamp(17 * uiScale, 14, 22));
    const goldFont = Math.round(clamp(30 * uiScale, 24, 38));

    const currentEntry = lastSavedEntry || {
      name: playerName,
      score,
      playedAt: new Date().toISOString()
    };
    const topScores = getTopScores(3);
    const topEntry = topScores[0] || currentEntry;

    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(0, 0, gameWidth, gameHeight);

    ctx.fillStyle = "white";
    ctx.textAlign = "center";
    ctx.font = "bold " + titleFont + "px Arial";
    ctx.fillText("Game Over", gameWidth / 2, gameHeight / 2 - 40);

    ctx.font = bodyFont + "px Arial";
    ctx.fillText("Score: " + score, gameWidth / 2, gameHeight / 2);

    ctx.font = subTextFont + "px Arial";
    ctx.fillText("Played: " + formatPlayedAt(currentEntry.playedAt), gameWidth / 2, gameHeight / 2 + 30);

    ctx.fillStyle = "#fbbf24";
    ctx.font = "900 " + goldFont + "px Impact, Arial Black, sans-serif";
    ctx.fillText("#1 " + topEntry.name + " - " + topEntry.score, gameWidth / 2, gameHeight / 2 + 68);

    const tableWidth = clamp(gameWidth * 0.9, 300, 760);
    const rowHeight = Math.round(clamp(30 * uiScale, 24, 36));
    const headerHeight = rowHeight;
    const tableRows = 3;
    const tableHeight = headerHeight + rowHeight * tableRows;
    const tableX = (gameWidth - tableWidth) / 2;
    const tableY = gameHeight / 2 + 92;

    ctx.fillStyle = "rgba(15,23,42,0.72)";
    ctx.fillRect(tableX, tableY, tableWidth, tableHeight);
    ctx.strokeStyle = "rgba(255,255,255,0.45)";
    ctx.lineWidth = 1;
    ctx.strokeRect(tableX, tableY, tableWidth, tableHeight);

    const colRank = tableX + tableWidth * 0.09;
    const colUser = tableX + tableWidth * 0.33;
    const colScore = tableX + tableWidth * 0.57;
    const colPlayed = tableX + tableWidth * 0.81;

    ctx.textAlign = "center";
    ctx.fillStyle = "#e2e8f0";
    ctx.font = "700 " + Math.round(clamp(14 * uiScale, 12, 17)) + "px Arial";
    ctx.fillText("Rank", colRank, tableY + headerHeight * 0.66);
    ctx.fillText("User", colUser, tableY + headerHeight * 0.66);
    ctx.fillText("Score", colScore, tableY + headerHeight * 0.66);
    ctx.fillText("Date/Time", colPlayed, tableY + headerHeight * 0.66);

    ctx.strokeStyle = "rgba(255,255,255,0.25)";
    for (let i = 1; i <= tableRows; i += 1) {
      const y = tableY + headerHeight + rowHeight * i;
      ctx.beginPath();
      ctx.moveTo(tableX, y);
      ctx.lineTo(tableX + tableWidth, y);
      ctx.stroke();
    }

    const fallbackRows = topScores.slice();
    while (fallbackRows.length < 3) {
      fallbackRows.push(null);
    }

    fallbackRows.forEach((entry, idx) => {
      const rowCenterY = tableY + headerHeight + rowHeight * idx + rowHeight * 0.66;
      const isTop = idx === 0 && entry;

      ctx.font = (isTop ? "900 " : "700 ") + Math.round(clamp((isTop ? 16 : 14) * uiScale, 12, isTop ? 22 : 18)) + "px Arial";
      ctx.fillStyle = isTop ? "#fbbf24" : "#f8fafc";

      if (!entry) {
        ctx.fillText("-", colRank, rowCenterY);
        ctx.fillText("-", colUser, rowCenterY);
        ctx.fillText("-", colScore, rowCenterY);
        ctx.fillText("-", colPlayed, rowCenterY);
        return;
      }

      ctx.fillText(String(idx + 1), colRank, rowCenterY);
      ctx.fillText(entry.name, colUser, rowCenterY);
      ctx.fillText(String(entry.score), colScore, rowCenterY);
      ctx.fillText(formatPlayedAtShort(entry.playedAt), colPlayed, rowCenterY);
    });

    updateGameOverActionsLayout(tableX, tableY, tableWidth, tableHeight);
    ctx.textAlign = "left";
  } else {
    gameOverActions.style.display = "none";
  }
}


function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
