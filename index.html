<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Bouncing Bruce V31</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
    }
    body {
      margin: 0;
      overflow: hidden;
      background: #87ceeb;
      font-family: Arial, sans-serif;
      touch-action: none;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
    }
    canvas {
      display: block;
      margin: auto;
      width: 100vw;
      height: 100dvh;
      background: linear-gradient(#70c5ce, #ffffff);
    }
    .hud-panel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      width: min(92vw, 380px);
      background: transparent;
      border: 0;
      border-radius: 0;
      padding: 0;
      box-shadow: none;
      touch-action: auto;
      pointer-events: auto;
    }
    .hud-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(15, 23, 42, 0.18);
      border-radius: 14px;
      padding: 8px 10px;
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.10);
      backdrop-filter: blur(4px);
    }
    .hud-row label {
      font-size: 13px;
      font-weight: 700;
      color: #111827;
      white-space: nowrap;
    }
    .hud-row input {
      flex: 1;
      font-size: 14px;
      padding: 7px 9px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      outline: none;
      min-width: 0;
    }
    .hud-row input:focus {
      border-color: #0284c7;
      box-shadow: 0 0 0 2px rgba(2, 132, 199, 0.2);
    }
    .hud-row select {
      flex: 1;
      font-size: 14px;
      padding: 7px 9px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      outline: none;
      min-width: 0;
      background: #ffffff;
    }
    .hud-row select:focus {
      border-color: #0284c7;
      box-shadow: 0 0 0 2px rgba(2, 132, 199, 0.2);
    }
    .image-upload-row input[type="file"] {
      flex: 1;
      min-width: 0;
      font-size: 12px;
      color: #0f172a;
    }
    .image-upload-row input[type="file"]::file-selector-button {
      border: 0;
      border-radius: 8px;
      background: #0f172a;
      color: #ffffff;
      font-size: 12px;
      font-weight: 800;
      padding: 7px 9px;
      margin-right: 8px;
      cursor: pointer;
    }
    .image-upload-name {
      display: none;
      margin: -2px 0 8px;
      text-align: center;
      color: #0f172a;
      background: rgba(255, 255, 255, 0.72);
      border-radius: 10px;
      padding: 5px 8px;
      font-size: 11px;
      font-weight: 700;
      line-height: 1.25;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
    }
    @media (max-width: 520px) {
      .hud-panel {
        width: min(90vw, 340px);
      }
      .player-choice-button,
      .start-button {
        min-height: 48px;
        font-size: 15px;
      }
      .hud-row {
        min-height: 42px;
      }
      .image-upload-row input[type="file"] {
        font-size: 11px;
      }
    }
    .sprite-hint {
      display: none !important;
    }
    .score-list-title,
    .score-list {
      display: none !important;
    }
    .hud-actions {
      margin-top: 10px;
    }
    .start-button {
      width: 100%;
      border: 0;
      border-radius: 14px;
      background: #0284c7;
      color: #ffffff;
      font-size: 16px;
      font-weight: 900;
      padding: 13px 14px;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(2, 132, 199, 0.22);
    }
    .start-button:disabled {
      cursor: not-allowed;
      opacity: 0.65;
      box-shadow: none;
    }
    .start-button:active {
      transform: translateY(1px);
    }
    .secondary-button {
      width: 100%;
      border: 1px solid #94a3b8;
      border-radius: 10px;
      background: #ffffff;
      color: #0f172a;
      font-size: 13px;
      font-weight: 700;
      padding: 9px 12px;
      cursor: pointer;
      margin-top: 6px;
    }
    .secondary-button:active {
      transform: translateY(1px);
    }
    .game-title {
      margin-bottom: 12px;
      text-align: center;
      color: #0f172a;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(15, 23, 42, 0.18);
      border-radius: 18px;
      padding: 12px 14px;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.12);
      backdrop-filter: blur(4px);
    }
    .game-title-main {
      font-size: clamp(30px, 9vw, 46px);
      font-weight: 950;
      line-height: 1;
      letter-spacing: -0.04em;
    }
    .game-title-sub {
      margin-top: 6px;
      font-size: 12px;
      font-weight: 900;
      color: #334155;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .selected-sprite-preview {
      margin-bottom: 10px;
      min-height: 96px;
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid rgba(15, 23, 42, 0.18);
      border-radius: 14px;
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.10);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 8px;
    }
    .selected-sprite-preview img {
      max-width: 100%;
      max-height: 82px;
      object-fit: contain;
      image-rendering: auto;
    }
    .selected-sprite-label {
      margin: -2px 0 10px;
      text-align: center;
      color: #334155;
      font-size: 11px;
      font-weight: 800;
    }
    .sprite-tools-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }
    .sprite-tool-button {
      border: 1px solid #94a3b8;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.92);
      color: #0f172a;
      font-size: 12px;
      font-weight: 800;
      padding: 8px 10px;
      cursor: pointer;
    }
    .sprite-tool-button:active {
      transform: translateY(1px);
    }
    .start-status {
      margin-top: 7px;
      text-align: center;
      color: #334155;
      font-size: 11px;
      font-weight: 800;
      min-height: 14px;
    }
    .player-button-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }
    .player-choice-button {
      flex: 1;
      border: 1px solid rgba(15, 23, 42, 0.24);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.9);
      color: #0f172a;
      font-size: 16px;
      font-weight: 900;
      padding: 13px 10px;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.12);
      backdrop-filter: blur(4px);
    }
    .player-choice-button.selected {
      border-color: #0284c7;
      background: #0284c7;
      color: #ffffff;
      box-shadow: 0 8px 18px rgba(2, 132, 199, 0.22);
    }
    .player-choice-button:active {
      transform: translateY(1px);
    }
    .auth-status {
      font-size: 12px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 8px;
      line-height: 1.25;
    }
    .auth-note {
      color: #475569;
      font-size: 11px;
      line-height: 1.25;
      margin-bottom: 8px;
    }

    .warning-note {
      display: none;
      color: #92400e;
      background: #fef3c7;
      border: 1px solid #f59e0b;
      border-radius: 8px;
      padding: 7px 9px;
      font-size: 11px;
      line-height: 1.25;
      margin-bottom: 8px;
    }
    .asset-warning {
      display: none !important;
    }
    .pause-side-row {
      justify-content: center;
    }
    .pause-side-row label {
      flex: 1;
      white-space: normal;
      text-align: left;
    }
    .pause-side-row input[type="checkbox"] {
      flex: 0 0 auto;
      width: 20px;
      height: 20px;
      min-width: 20px;
      accent-color: #0284c7;
    }
    .pause-button {
      position: fixed;
      left: calc(12px + env(safe-area-inset-left));
      right: auto;
      bottom: calc(12px + env(safe-area-inset-bottom));
      z-index: 12;
      display: none;
      border: 1px solid rgba(15, 23, 42, 0.24);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.92);
      color: #0f172a;
      font-size: 13px;
      font-weight: 800;
      padding: 9px 12px;
      cursor: pointer;
      pointer-events: auto;
    }
    .pause-button.pause-right {
      left: auto;
      right: calc(12px + env(safe-area-inset-right));
    }
    .game-over-actions {
      position: fixed;
      z-index: 15;
      display: none;
      gap: 10px;
      pointer-events: auto;
    }
    .game-over-actions button {
      flex: 1;
      border: 0;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      padding: 10px 12px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.22);
    }
    .game-over-actions .play-again-button {
      background: #0284c7;
      color: #ffffff;
    }
    .game-over-actions .logout-gameover-button {
      background: #ffffff;
      color: #0f172a;
      border: 1px solid #94a3b8;
    }

    .no-background-row {
      justify-content: center;
    }
    .no-background-row label {
      flex: 1;
      white-space: normal;
      text-align: left;
      font-size: 13px;
      font-weight: 900;
    }
    .no-background-row input[type="checkbox"] {
      flex: 0 0 auto;
      width: 20px;
      height: 20px;
      min-width: 20px;
      accent-color: #0284c7;
    }
    .today-scores-modal {
      position: fixed;
      inset: 0;
      z-index: 32;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: rgba(15, 23, 42, 0.66);
      touch-action: auto;
      pointer-events: auto;
    }
    .today-scores-card {
      width: min(94vw, 560px);
      max-height: min(82dvh, 720px);
      overflow: auto;
      background: rgba(255, 255, 255, 0.97);
      color: #0f172a;
      border: 1px solid rgba(15, 23, 42, 0.16);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 20px 48px rgba(15, 23, 42, 0.34);
      backdrop-filter: blur(5px);
    }
    .today-scores-title {
      font-size: 24px;
      font-weight: 950;
      text-align: center;
      margin-bottom: 6px;
    }
    .today-scores-subtitle {
      font-size: 12px;
      font-weight: 800;
      text-align: center;
      color: #475569;
      margin-bottom: 12px;
      line-height: 1.35;
    }
    .today-scores-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .today-score-summary-card {
      border: 1px solid rgba(15, 23, 42, 0.14);
      border-radius: 14px;
      background: #f8fafc;
      padding: 10px;
    }
    .today-score-summary-name {
      font-size: 16px;
      font-weight: 950;
      margin-bottom: 6px;
    }
    .today-score-summary-line {
      font-size: 12px;
      font-weight: 800;
      color: #334155;
      line-height: 1.45;
    }
    .today-scores-table-wrap {
      overflow-x: auto;
      border: 1px solid rgba(15, 23, 42, 0.12);
      border-radius: 12px;
      background: #ffffff;
    }
    .today-scores-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      font-weight: 800;
    }
    .today-scores-table th,
    .today-scores-table td {
      padding: 8px 7px;
      border-bottom: 1px solid rgba(15, 23, 42, 0.08);
      text-align: left;
      white-space: nowrap;
    }
    .today-scores-table th {
      background: #0f172a;
      color: #ffffff;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .today-scores-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }
    .today-scores-actions button {
      border: 0;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 950;
      padding: 11px 12px;
      cursor: pointer;
    }
    .today-scores-refresh-button {
      background: #0284c7;
      color: #ffffff;
    }
    .today-scores-close-button {
      background: #ffffff;
      color: #0f172a;
      border: 1px solid #94a3b8 !important;
    }
    @media (max-width: 520px) {
      .today-scores-grid {
        grid-template-columns: 1fr;
      }
      .today-scores-card {
        max-height: 84dvh;
        padding: 14px;
      }
    }

    .hundred-photo-modal {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(15, 23, 42, 0.62);
      touch-action: auto;
      pointer-events: auto;
    }
    .hundred-photo-card {
      width: min(92vw, 420px);
      background: rgba(255, 255, 255, 0.96);
      color: #0f172a;
      border: 1px solid rgba(15, 23, 42, 0.16);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 20px 48px rgba(15, 23, 42, 0.34);
      text-align: center;
      backdrop-filter: blur(5px);
    }
    .hundred-photo-title {
      font-size: 22px;
      font-weight: 950;
      margin-bottom: 8px;
    }
    .hundred-photo-text {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.4;
      color: #334155;
      margin-bottom: 14px;
    }
    .hundred-photo-button {
      width: 100%;
      border: 0;
      border-radius: 14px;
      background: #dc2626;
      color: #ffffff;
      font-size: 16px;
      font-weight: 950;
      padding: 13px 14px;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(220, 38, 38, 0.24);
    }
    .hundred-photo-button:active {
      transform: translateY(1px);
    }
    .hundred-photo-secondary-button {
      width: 100%;
      border: 1px solid #94a3b8;
      border-radius: 14px;
      background: #ffffff;
      color: #0f172a;
      font-size: 14px;
      font-weight: 900;
      padding: 12px 14px;
      cursor: pointer;
      margin-top: 8px;
      box-shadow: 0 6px 14px rgba(15, 23, 42, 0.12);
    }
    .hundred-photo-secondary-button:active {
      transform: translateY(1px);
    }
    .hundred-photo-start-button {
      display: none;
      width: 100%;
      border: 0;
      border-radius: 14px;
      background: #0284c7;
      color: #ffffff;
      font-size: 16px;
      font-weight: 950;
      padding: 13px 14px;
      cursor: pointer;
      margin-top: 8px;
      box-shadow: 0 8px 18px rgba(2, 132, 199, 0.24);
    }
    .hundred-photo-start-button:active {
      transform: translateY(1px);
    }

    .settings-panel {
      margin-bottom: 10px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(15, 23, 42, 0.18);
      border-radius: 14px;
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.10);
      backdrop-filter: blur(4px);
      overflow: hidden;
    }
    .settings-panel summary {
      list-style: none;
      cursor: pointer;
      padding: 12px 14px;
      color: #0f172a;
      font-size: 14px;
      font-weight: 950;
      text-align: center;
      user-select: none;
    }
    .settings-panel summary::-webkit-details-marker {
      display: none;
    }
    .settings-panel summary::after {
      content: " ▾";
      font-weight: 900;
    }
    .settings-panel[open] summary::after {
      content: " ▴";
    }
    .settings-content {
      padding: 0 10px 10px;
    }
    .settings-content .hud-row {
      box-shadow: none;
      margin-bottom: 8px;
      background: rgba(255, 255, 255, 0.95);
    }
    .settings-content .secondary-button {
      margin-top: 0;
      min-height: 42px;
      font-size: 14px;
      font-weight: 950;
      border-radius: 12px;
    }
    #spriteToolsRow,
    #noBackgroundRow,
    #startGameButton,
    #startStatusMessage {
      display: none !important;
    }

  </style>
</head>
<body>
<div class="hud-panel" id="hudPanel">
  <div class="game-title" id="gameTitle" aria-label="BOUNCING BRUCE">
    <div class="game-title-main">BOUNCING BRUCE</div>
  </div>
  <div class="selected-sprite-preview" id="selectedSpritePreview" aria-live="polite">
    <img id="selectedSpritePreviewImage" alt="Selected Bruce sprite preview">
  </div>
  <div class="selected-sprite-label" id="selectedSpriteLabel"></div>
  <div class="player-button-row" id="playerButtonRow">
    <button class="player-choice-button" id="chooseChubdooButton" type="button">Chubdoo</button>
    <button class="player-choice-button" id="chooseChubsonButton" type="button">Chubson</button>
  </div>
  <div class="sprite-tools-row" id="spriteToolsRow" style="display:none;">
    <button class="sprite-tool-button" id="randomSpriteButton" type="button">Random Bruce</button>
    <button class="sprite-tool-button" id="resetSpriteButton" type="button">Reset Bruce</button>
  </div>
  <input id="noBackgroundPhotoCheckbox" type="checkbox" checked style="display:none;" aria-hidden="true">
  <details class="settings-panel" id="settingsPanel">
    <summary>Settings</summary>
    <div class="settings-content">
      <div class="hud-row image-upload-row" id="imageUploadRow">
        <label for="imageUploadInput">Photo Reveal</label>
        <input id="imageUploadInput" type="file" accept="image/*" aria-label="Choose photo from your phone">
      </div>
      <div class="image-upload-name" id="imageUploadName"></div>
      <div class="hud-row pause-side-row" id="pauseSideRow">
        <input id="pauseRightCheckbox" type="checkbox">
        <label for="pauseRightCheckbox">Make pause button on right</label>
      </div>
      <button class="secondary-button" id="todayScoresButton" type="button">Scores</button>
    </div>
  </details>
  <div class="sprite-hint" id="spriteHint"></div>
  <div class="score-list-title" id="scoreListTitle"></div>
  <ol class="score-list" id="scoreList"></ol>
  <div class="hud-actions">
    <button class="start-button" id="startGameButton" type="button">Start Game</button>
    <div class="start-status" id="startStatusMessage"></div>
  </div>
  <div class="asset-warning" id="assetWarning"></div>
</div>

<div class="today-scores-modal" id="todayScoresModal" aria-live="polite">
  <div class="today-scores-card">
    <div class="today-scores-title">Scores</div>
    <div class="today-scores-subtitle" id="todayScoresSubtitle">Cloud daily scores</div>
    <div id="todayScoresContent">Loading scores...</div>
    <div class="today-scores-actions">
      <button class="today-scores-refresh-button" id="todayScoresRefreshButton" type="button">Refresh</button>
      <button class="today-scores-close-button" id="todayScoresCloseButton" type="button">Close</button>
    </div>
  </div>
</div>

<div class="hundred-photo-modal" id="hundredPhotoModal" aria-live="polite">
  <div class="hundred-photo-card">
    <div class="hundred-photo-title" id="hundredPhotoTitle">100 points!</div>
    <div class="hundred-photo-text" id="hundredPhotoText">Pick a new picture to reveal in the background. Bruce will restart in the center and receive 3 seconds of God Mode.</div>
    <button class="hundred-photo-button" id="hundredPhotoPickButton" type="button">Pick New Picture</button>
    <button class="hundred-photo-start-button" id="hundredPhotoStartButton" type="button">Start Game</button>
    <button class="hundred-photo-secondary-button" id="hundredPhotoContinueButton" type="button">Continue With Same Picture</button>
    <input id="hundredImageUploadInput" type="file" accept="image/*" style="display:none;" aria-label="Choose new background photo">
  </div>
</div>
<div class="game-over-actions" id="gameOverActions">
  <button class="logout-gameover-button" id="gameOverLogoutButton" type="button">Choose Player</button>
  <button class="play-again-button" id="gameOverPlayAgainButton" type="button">Play Again</button>
</div>
<button class="pause-button" id="pauseGameButton" type="button">Pause</button>
<canvas id="game"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const hudPanel = document.getElementById("hudPanel");
const hundredPhotoModal = document.getElementById("hundredPhotoModal");
const hundredPhotoTitle = document.getElementById("hundredPhotoTitle");
const hundredPhotoText = document.getElementById("hundredPhotoText");
const hundredPhotoPickButton = document.getElementById("hundredPhotoPickButton");
const hundredPhotoStartButton = document.getElementById("hundredPhotoStartButton");
const hundredPhotoContinueButton = document.getElementById("hundredPhotoContinueButton");
const hundredImageUploadInput = document.getElementById("hundredImageUploadInput");
const gameOverActions = document.getElementById("gameOverActions");
const gameOverLogoutButton = document.getElementById("gameOverLogoutButton");
const gameOverPlayAgainButton = document.getElementById("gameOverPlayAgainButton");
const spritePickerRow = document.getElementById("spritePickerRow");
const spritePicker = document.getElementById("spritePicker");
const spriteHint = document.getElementById("spriteHint");
const scoreList = document.getElementById("scoreList");
const scoreListTitle = document.getElementById("scoreListTitle");
const startGameButton = document.getElementById("startGameButton");
const imageUploadInput = document.getElementById("imageUploadInput");
const noBackgroundPhotoCheckbox = document.getElementById("noBackgroundPhotoCheckbox");
const imageUploadName = document.getElementById("imageUploadName");
const todayScoresButton = document.getElementById("todayScoresButton");
const todayScoresModal = document.getElementById("todayScoresModal");
const todayScoresContent = document.getElementById("todayScoresContent");
const todayScoresSubtitle = document.getElementById("todayScoresSubtitle");
const todayScoresRefreshButton = document.getElementById("todayScoresRefreshButton");
const todayScoresCloseButton = document.getElementById("todayScoresCloseButton");
const pauseRightCheckbox = document.getElementById("pauseRightCheckbox");
const chooseChubsonButton = document.getElementById("chooseChubsonButton");
const chooseChubdooButton = document.getElementById("chooseChubdooButton");
const selectedSpritePreview = document.getElementById("selectedSpritePreview");
const selectedSpritePreviewImage = document.getElementById("selectedSpritePreviewImage");
const selectedSpriteLabel = document.getElementById("selectedSpriteLabel");
const randomSpriteButton = document.getElementById("randomSpriteButton");

function getLocalStorageKeys(prefix) {
  const keys = [];
  if (typeof localStorage.length === "number" && typeof localStorage.key === "function") {
    for (let i = 0; i < localStorage.length; i += 1) {
      const key = localStorage.key(i);
      if (!prefix || (key && key.startsWith(prefix))) {
        keys.push(key);
      }
    }
    return keys;
  }

  return Object.keys(localStorage).filter(key => !prefix || key.startsWith(prefix));
}

function downloadJsonText(text, filename) {
  const blob = new Blob([text], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
}

function getHawaiiDayString(date) {
  const d = date || new Date();
  try {
    // Build YYYY-MM-DD manually from Hawaii-time date parts.
    // This avoids iPhone/Safari locale differences like 6/27/2026 vs 2026-06-27.
    const parts = new Intl.DateTimeFormat("en-US", {
      timeZone: "Pacific/Honolulu",
      year: "numeric",
      month: "2-digit",
      day: "2-digit"
    }).formatToParts(d);

    const values = {};
    parts.forEach(part => {
      values[part.type] = part.value;
    });

    if (values.year && values.month && values.day) {
      return values.year + "-" + values.month + "-" + values.day;
    }
  } catch {
    // Fall back to the device's local day if Intl timezone support fails.
  }
  return getDayString(d);
}

function normalizeCloudScoreEntry(row) {
  if (!row) {
    return null;
  }

  const userKey = getUserKey(row.player_key || row.player_name || row.name || "");
  if (!isFixedUserKey(userKey)) {
    return null;
  }

  const points = Math.max(0, Math.floor(Number(row.score) || 0));
  return {
    name: FIXED_USER_ACCOUNTS[userKey].userName,
    score: points,
    playedAt: row.played_at || row.playedAt || new Date().toISOString()
  };
}

function updateCloudDailyLeader() {
  const dooPoints = cloudDailyTotals.chubdoo ? Number(cloudDailyTotals.chubdoo.totalPoints) || 0 : 0;
  const sonPoints = cloudDailyTotals.chubson ? Number(cloudDailyTotals.chubson.totalPoints) || 0 : 0;

  if (dooPoints > sonPoints) {
    cloudDailyLeaderKey = "chubdoo";

function addCloudDailyTotalFromScoreRow(totals, row) {
  const userKey = getUserKey(row && (row.player_key || row.player_name || row.name || ""));
  if (!isFixedUserKey(userKey)) {
    return;
  }

  const points = Math.max(0, Math.floor(Number(row.score) || 0));
  if (!totals[userKey]) {
    totals[userKey] = createEmptyCloudDailyTotals()[userKey];
  }
  totals[userKey].userName = FIXED_USER_ACCOUNTS[userKey].userName;
  totals[userKey].totalPoints += points;
  totals[userKey].gamesPlayed += 1;
  totals[userKey].highScore = Math.max(totals[userKey].highScore || 0, points);
}

function isSupabaseRestConfigured() {
  return Boolean(SUPABASE_PROJECT_URL && SUPABASE_PUBLISHABLE_KEY);
}

function getSupabaseRestUrl(pathAndQuery) {
  return SUPABASE_PROJECT_URL.replace(/\/$/, "") + "/rest/v1/" + pathAndQuery;
}

async function supabaseRestRequest(pathAndQuery, options) {
  if (!isSupabaseRestConfigured()) {
    throw new Error("Supabase URL/key missing");
  }

  const requestOptions = options || {};
  const headers = Object.assign({
    apikey: SUPABASE_PUBLISHABLE_KEY,
    Authorization: "Bearer " + SUPABASE_PUBLISHABLE_KEY,
    Accept: "application/json"
  }, requestOptions.headers || {});

  const response = await fetch(getSupabaseRestUrl(pathAndQuery), {
    method: requestOptions.method || "GET",
    headers,
    body: requestOptions.body
  });

  const text = await response.text();
  let data = null;
  if (text) {
    try {
      data = JSON.parse(text);
    } catch {
      data = text;
    }
  }

  if (!response.ok) {
    const message = data && typeof data === "object"
      ? (data.message || data.error || JSON.stringify(data))
      : (text || response.statusText);
    throw new Error("HTTP " + response.status + ": " + String(message).slice(0, 180));
  }

  return data;
}

}

  localStorage.setItem(PENDING_CLOUD_SCORE_QUEUE_KEY, JSON.stringify(pendingCloudScoreQueue));
}

function queueCloudScoreForRetry(entry) {
  const queue = loadPendingCloudScoreQueue();
  const key = getScoreEntryKey(entry);
  if (!queue.some(item => getScoreEntryKey(item) === key)) {
    queue.unshift(entry);
  }
  savePendingCloudScoreQueue(queue);
}

async function retryPendingCloudScores() {
  const queue = loadPendingCloudScoreQueue();
  if (!queue.length || !isSupabaseRestConfigured()) {
    return;
  }

  const stillPending = [];
  for (const entry of queue.slice().reverse()) {
    const ok = await saveScoreToServer(entry, { fromRetry: true, skipQueue: true });
    if (!ok) {
      stillPending.push(entry);
    }
  }
  savePendingCloudScoreQueue(stillPending.reverse());
}

async function loadCloudScores() {
  if (isActiveRoundInProgress()) {
    cloudRefreshPendingAfterRound = true;
    return;
  }

  if (!isSupabaseRestConfigured()) {
    cloudScoresLoaded = false;
    cloudTodayScores = [];
    cloudLastLoadStatus = "Cloud not configured";
    cloudLastErrorDetail = "";
    draw();
    return;
  }

  const today = getHawaiiDayString();
  try {
    const todayQuery = "game_scores?select=player_key,player_name,score,played_at,game_day" +
      "&game_day=eq." + encodeURIComponent(today) +
      "&order=score.desc" +
      "&order=played_at.asc" +
      "&limit=1000";
    const todayRows = await supabaseRestRequest(todayQuery);

    const dailyTotals = createEmptyCloudDailyTotals();
    const safeTodayRows = Array.isArray(todayRows) ? todayRows : [];
    safeTodayRows.forEach(row => addCloudDailyTotalFromScoreRow(dailyTotals, row));
    cloudDailyTotals = dailyTotals;
    cloudTodayScores = safeTodayRows
      .map(normalizeCloudScoreEntry)
      .filter(Boolean)
      .sort((a, b) => getPlayedAtTime(b) - getPlayedAtTime(a));
    cloudTopScores = cloudTodayScores
      .slice()
      .sort(compareScoreEntries)
      .slice(0, 20);

    const allRows = await supabaseRestRequest(
      "game_scores?select=player_key,player_name,score,played_at,game_day" +
      "&order=played_at.desc" +
      "&limit=10000"
    );

    const lifetimeTotals = createEmptyCloudLifetimeTotals();
    const safeAllRows = Array.isArray(allRows) ? allRows : [];
    safeAllRows.forEach(row => addCloudLifetimeTotalFromScoreRow(lifetimeTotals, row));
    cloudLifetimeTotals = lifetimeTotals;

    cloudScoresLoaded = true;
    cloudScoresLastLoadedAt = Date.now();
    cloudLastLoadStatus = "Cloud connected: " + safeTodayRows.length + " score row(s) today";
    cloudLastErrorDetail = "";
    updateCloudDailyLeader();
    renderScoreHistory();
    if (todayScoresModal && todayScoresModal.style.display === "flex") {
      renderTodayScoresModal();
    }
    draw();
  } catch (error) {
    console.warn("Cloud score load error:", error);
    cloudScoresLoaded = false;
    cloudTodayScores = [];
    cloudLastLoadStatus = "Cloud load failed";
    cloudLastErrorDetail = "Cloud load failed: " + (error && error.message ? error.message : String(error));
    renderScoreHistory();
    draw();
  }
}

async function saveScoreToServer(entry, options) {
  const opts = options || {};
  if (!entry) {
    return false;
  }

  if (!isSupabaseRestConfigured()) {
    cloudLastSaveStatus = "Cloud save skipped: Supabase not configured";
    cloudLastErrorDetail = cloudLastSaveStatus;
    if (!opts.skipQueue) queueCloudScoreForRetry(entry);
    draw();
    return false;
  }

  const userKey = getUserKey(entry.name || playerName || "");
  if (!isFixedUserKey(userKey)) {
    cloudLastSaveStatus = "Cloud save skipped: invalid player";
    cloudLastErrorDetail = cloudLastSaveStatus;
    draw();
    return false;
  }

  const cleanScore = Math.max(0, Math.floor(Number(entry.score) || 0));
  const playedAt = entry.playedAt || new Date().toISOString();
  const payload = {
    player_key: userKey,
    player_name: FIXED_USER_ACCOUNTS[userKey].userName,
    score: cleanScore,
    game_day: getHawaiiDayString(new Date(playedAt)),
    played_at: playedAt
  };

  const metadataPayload = {
    ...payload,
    selected_character: entry.selectedCharacter || currentSprite || "",
    difficulty_settings_version: entry.pipeSettingsVersion || PIPE_SETTINGS_VERSION,
    difficulty_phase: entry.difficultyPhaseAtDeath || getDifficulty(cleanScore).name,
    death_score: cleanScore,
    death_pipe_number: Math.max(0, Math.floor(Number(entry.deathPipeNumber) || totalPipesCreated || 0)),
    device_type: entry.deviceType || getDeviceType(),
    attempt_number: Math.max(0, Math.floor(Number(entry.attemptNumber) || currentAttemptNumber || 0)),
    background_photo_mode: entry.backgroundPhotoMode || (shouldUseBackgroundPhoto() ? "photo_reveal" : "no_background"),
    god_mode_bonus_used: Boolean(entry.godModeBonusUsed),
    mystery_effect_at_death: entry.mysteryEffectAtDeath || deathEffectLabel || "None"
  };

  cloudLastSaveStatus = "Cloud save: saving " + payload.player_name + " " + cleanScore + "...";
  cloudLastErrorDetail = "";
  draw();

  try {
    try {
      await supabaseRestRequest("game_scores", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Prefer: "return=representation"
        },
        body: JSON.stringify(metadataPayload)
      });
    } catch (metadataError) {
      // If the database has not been upgraded with the optional analytics columns yet,
      // keep the game working by saving the basic score row.
      if (!isMissingMetadataColumnError(metadataError)) {
        throw metadataError;
      }
      console.warn("Cloud score metadata columns missing; saved basic score only:", metadataError);
      await supabaseRestRequest("game_scores", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Prefer: "return=representation"
        },
        body: JSON.stringify(payload)
      });
    }

    cloudLastSaveStatus = "Cloud save OK";
    cloudLastSavedScoreText = "Cloud saved: " + payload.player_name + " +" + cleanScore + " pts";
    cloudLastErrorDetail = "";
    if (!opts.fromRetry) {
      const queue = loadPendingCloudScoreQueue().filter(item => getScoreEntryKey(item) !== getScoreEntryKey(entry));
      savePendingCloudScoreQueue(queue);
    }
    await loadCloudScores();
    return true;
  } catch (error) {
    console.warn("Cloud score save error:", error);
    cloudLastSaveStatus = "Cloud save failed";
    cloudLastErrorDetail = "Cloud save failed: " + (error && error.message ? error.message : String(error));
    if (!opts.skipQueue) {
      queueCloudScoreForRetry(entry);
    }
    draw();
    return false;
  }
}

function subscribeToCloudScores() {
  if (!supabaseClient || cloudRealtimeChannel) {
    return;
  }

  try {
    cloudRealtimeChannel = supabaseClient
      .channel("bouncing-bruce-cloud-scores")
      .on(
        "postgres_changes",
        { event: "INSERT", schema: "public", table: "game_scores" },
        () => requestCloudScoreRefresh()
      )
      .subscribe();
  } catch (error) {
    console.warn("Supabase realtime setup failed:", error);
  }
}

function getDifficulty(rawScore) {
  const safeScore = Math.max(0, Math.floor(Number(rawScore) || 0));

  if (safeScore < 10) {
    return {
      name: "Beginner",
      gapSize: 200,
      pipeSpeed: 2.1,
      pipeSpacing: 300,
      minGapMove: 35,
      maxGapMove: 100
    };
  }

  if (safeScore < 30) {
    return {
      name: "Medium",
      gapSize: 180,
      pipeSpeed: 2.35,
      pipeSpacing: 285,
      minGapMove: 45,
      maxGapMove: 125
    };
  }

  if (safeScore < 60) {
    return {
      name: "Hard",
      gapSize: 160,
      pipeSpeed: 2.65,
      pipeSpacing: 265,
      minGapMove: 55,
      maxGapMove: 150
    };
  }

  if (safeScore < 100) {
    return {
      name: "Expert",
      gapSize: 145,
      pipeSpeed: 2.9,
      pipeSpacing: 250,
      minGapMove: 65,
      maxGapMove: 170
    };
  }

  return {
    name: "Legend",
    gapSize: 135,
    pipeSpeed: 3.1,
    pipeSpacing: 240,
    minGapMove: 75,
    maxGapMove: 190
  };
}

function randomBetween(min, max) {
  return min + Math.random() * (max - min);
}

function createNextGap(previousGapY, scoreValue, canvasHeight) {
  const d = getDifficulty(scoreValue);
  const safetyMargin = Math.round(clamp(30 * uiScale, 24, 42));
  const minGapY = d.gapSize / 2 + safetyMargin;
  const maxGapY = canvasHeight - d.gapSize / 2 - safetyMargin;

  if (!Number.isFinite(previousGapY)) {
    // Start the first pipe in a safe center band, but not always dead center.
    // This keeps the first obstacle fair while making each round feel less identical.
    const centerBandMin = Math.max(minGapY, canvasHeight * 0.36);
    const centerBandMax = Math.min(maxGapY, canvasHeight * 0.64);
    return randomBetween(centerBandMin, centerBandMax);
  }

  // V41: min/max vertical movement keeps gaps more random without becoming unfair.
  // Every pipe must move at least minGapMove pixels from the previous gap,
  // while maxGapMove prevents impossible top-to-bottom jumps.
  const variationBoost = Math.random() < 0.22 ? 1.28 : 1.0;
  const minMove = d.minGapMove;
  const maxMove = d.maxGapMove * variationBoost;
  const moveAmount = randomBetween(minMove, maxMove);
  const direction = Math.random() < 0.5 ? -1 : 1;
  let nextGapY = previousGapY + direction * moveAmount;

  // If the chosen direction hits the top/bottom clamp too hard, try the opposite direction.
  // This keeps the random movement noticeable even near the screen edges.
  const clampedGapY = clamp(nextGapY, minGapY, maxGapY);
  if (Math.abs(clampedGapY - previousGapY) < minMove * 0.55) {
    nextGapY = previousGapY - direction * moveAmount;
  }

  return clamp(nextGapY, minGapY, maxGapY);
}

function compareScoreEntries(a, b) {
  if (b.score !== a.score) {
    return b.score - a.score;
  }
  // Earlier timestamp wins tie-breaker for top scorer ranking.
  return getPlayedAtTime(a) - getPlayedAtTime(b);
}

function isValidScoreEntry(entry) {
  return entry &&
    typeof entry.name === "string" &&
    isAllowedPlayerName(entry.name) &&
    Number.isFinite(entry.score) &&
    typeof entry.playedAt === "string";
}

function getScoreEntryKey(entry) {
  return normalizedName(entry.name) + "|" + entry.score + "|" + entry.playedAt;
}

function mergeScoreEntries(...entryLists) {
  const seen = new Set();
  const merged = [];

  entryLists.flat().filter(isValidScoreEntry).forEach(entry => {
    const key = getScoreEntryKey(entry);
    if (!seen.has(key)) {
      seen.add(key);
      merged.push(entry);
    }
  });

  return merged.sort(compareScoreEntries);
}

function shuffleRevealCells() {
  revealCellOrder = Array.from({ length: 100 }, (_, index) => index);
  for (let i = revealCellOrder.length - 1; i > 0; i -= 1) {
    const j = Math.floor(Math.random() * (i + 1));
    const temp = revealCellOrder[i];
    revealCellOrder[i] = revealCellOrder[j];
    revealCellOrder[j] = temp;
  }
}

function resetImageRevealPuzzle() {
  if (revealImageReady) {
    shuffleRevealCells();

function clearRevealImageSelection() {
  if (revealImageObjectUrl) {
    URL.revokeObjectURL(revealImageObjectUrl);
  }
  revealImage = new Image();
  revealImageReady = false;
  revealImageName = "";
  revealImageObjectUrl = "";
  revealCellOrder = [];

function loadRevealImageFile(file, afterLoad) {
  if (!file) {
    return;
  }

  const previousImage = revealImage;
  const previousReady = revealImageReady;
  const previousName = revealImageName;
  const previousObjectUrl = revealImageObjectUrl;
  const nextObjectUrl = URL.createObjectURL(file);
  const nextImage = new Image();
  const nextName = file.name || "img-1";

  nextImage.onload = () => {
    if (previousObjectUrl && previousObjectUrl !== nextObjectUrl) {
      URL.revokeObjectURL(previousObjectUrl);
    }

    revealImage = nextImage;
    revealImageObjectUrl = nextObjectUrl;
    revealImageName = nextName;
    revealImageReady = true;
    keepCurrentPhotoFullyRevealed = false;
    resetImageRevealPuzzle();

    if (imageUploadName) {
      imageUploadName.style.display = "block";
      imageUploadName.textContent = "Photo loaded: " + revealImageName;
    }

    updateStartButtonState();

    if (typeof afterLoad === "function") {
      afterLoad();
    } else {
      draw();
    }
  };

  nextImage.onerror = () => {
    URL.revokeObjectURL(nextObjectUrl);
    revealImage = previousImage;
    revealImageReady = previousReady;
    revealImageName = previousName;
    revealImageObjectUrl = previousObjectUrl;

    if (imageUploadName) {
      imageUploadName.style.display = "block";
      imageUploadName.textContent = previousReady
        ? "Could not load new photo. Keeping current photo."
        : "Could not load photo. Pick a different image.";
    }

    alert(previousReady ? "Could not load new photo. Keeping current photo." : "Could not load photo. Pick a different image.");
    updateStartButtonState();
    draw();
  };

  nextImage.src = nextObjectUrl;
}

  return clamp(Math.floor(score % 100), 0, 100);

function drawImageRevealPuzzle(panelX, panelY, panelSize) {
  if (!revealImageReady || !revealImage.complete || revealImage.naturalWidth <= 0) {
    return;
  }

  const revealedCount = getImageRevealCount();
  const padding = Math.round(clamp(8 * uiScale, 6, 12));
  const labelHeight = Math.round(clamp(24 * uiScale, 20, 30));
  const imageSize = panelSize - padding * 2;
  const imageX = panelX + padding;
  const imageY = panelY + labelHeight + padding;
  const cardHeight = imageSize + labelHeight + padding * 2;

  ctx.save();
  ctx.fillStyle = "rgba(15,23,42,0.68)";
  ctx.fillRect(panelX, panelY, panelSize, cardHeight);
  ctx.strokeStyle = "rgba(255,255,255,0.48)";
  ctx.lineWidth = 1;
  ctx.strokeRect(panelX, panelY, panelSize, cardHeight);

  ctx.fillStyle = "#f8fafc";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.font = "900 " + Math.round(clamp(12 * uiScale, 10, 15)) + "px Arial";
  ctx.fillText("photo reveal " + revealedCount + "/100", panelX + panelSize / 2, panelY + labelHeight / 2);

  ctx.fillStyle = "rgba(2, 6, 23, 0.92)";
  ctx.fillRect(imageX, imageY, imageSize, imageSize);

  const sourceCellW = revealImage.naturalWidth / 10;
  const sourceCellH = revealImage.naturalHeight / 10;
  const destCell = imageSize / 10;

  for (let i = 0; i < revealedCount && i < revealCellOrder.length; i += 1) {
    const cellIndex = revealCellOrder[i];
    const col = cellIndex % 10;
    const row = Math.floor(cellIndex / 10);
    ctx.drawImage(
      revealImage,
      col * sourceCellW,
      row * sourceCellH,
      sourceCellW,
      sourceCellH,
      imageX + col * destCell,
      imageY + row * destCell,
      destCell + 0.5,
      destCell + 0.5
    );
  }

  ctx.strokeStyle = "rgba(255,255,255,0.22)";
  ctx.lineWidth = 1;
  for (let i = 0; i <= 10; i += 1) {
    const line = imageX + i * destCell;
    ctx.beginPath();
    ctx.moveTo(line, imageY);
    ctx.lineTo(line, imageY + imageSize);
    ctx.stroke();

    const rowLine = imageY + i * destCell;
    ctx.beginPath();
    ctx.moveTo(imageX, rowLine);
    ctx.lineTo(imageX + imageSize, rowLine);
    ctx.stroke();
  }

  ctx.restore();
}

function drawActiveImageRevealPuzzle() {
  if (!shouldUseBackgroundPhoto() || gameOver) {
    return;
  }
  const panelSize = Math.round(clamp(Math.min(gameWidth * 0.28, gameHeight * 0.22), 104, 172));
  const panelX = gameWidth - panelSize - Math.round(clamp(12 * uiScale, 10, 18));
  const panelY = Math.round(clamp(78 * uiScale, 66, 96));
  drawImageRevealPuzzle(panelX, panelY, panelSize);
}

function drawSkyBackground() {
  const gradient = ctx.createLinearGradient(0, 0, 0, gameHeight);
  gradient.addColorStop(0, "#70c5ce");
  gradient.addColorStop(1, "#ffffff");
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, gameWidth, gameHeight);
}

function getRevealImageCoverRect() {
  const imageRatio = revealImage.naturalWidth / revealImage.naturalHeight;
  const canvasRatio = gameWidth / gameHeight;
  let sx = 0;
  let sy = 0;
  let sw = revealImage.naturalWidth;
  let sh = revealImage.naturalHeight;

  if (imageRatio > canvasRatio) {
    sw = revealImage.naturalHeight * canvasRatio;
    sx = (revealImage.naturalWidth - sw) / 2;
  } else {
    sh = revealImage.naturalWidth / canvasRatio;
    sy = (revealImage.naturalHeight - sh) / 2;
  }

  return { sx, sy, sw, sh };
}

function drawRevealedPhotoBackground() {
  if (!shouldUseBackgroundPhoto() || !revealImage.complete || revealImage.naturalWidth <= 0) {
    return;
  }

  const revealedCount = getImageRevealCount();
  if (revealedCount <= 0) {
    return;
  }

  const cover = getRevealImageCoverRect();
  const destCellW = gameWidth / 10;
  const destCellH = gameHeight / 10;
  const sourceCellW = cover.sw / 10;
  const sourceCellH = cover.sh / 10;

  ctx.save();
  for (let i = 0; i < revealedCount && i < revealCellOrder.length; i += 1) {
    const cellIndex = revealCellOrder[i];
    const col = cellIndex % 10;
    const row = Math.floor(cellIndex / 10);

    ctx.drawImage(
      revealImage,
      cover.sx + col * sourceCellW,
      cover.sy + row * sourceCellH,
      sourceCellW,
      sourceCellH,
      col * destCellW,
      row * destCellH,
      destCellW + 0.75,
      destCellH + 0.75
    );
  }
  ctx.restore();
}

function drawGameBackground() {
  drawSkyBackground();
  drawRevealedPhotoBackground();
}

function promptForNewPhotoAtHundred(pipe) {
  // Trigger at every 100-point milestone. Use >= instead of === so the
  // prompt cannot be missed if more than one pipe is passed in a fast frame.
  if (isNoBackgroundPhotoEnabled() || !revealImageReady) {

function restorePlayerAtHundredPosition() {

function resumeAfterHundredPhotoChange(options) {

  const shouldResetReveal = settings.resetReveal !== false;

  hundredPhotoReadyToStart = false;
  backgroundSwapPending = false;
  pendingHundredScore = 0;

// ── Effects system ──────────────────────────────────────────────────────────
function recalculateEffectMultipliers() {
  sizeMultiplier = activeEffects.size ? activeEffects.size.sizeMultiplier : 1;
  speedMultiplier = activeEffects.speed ? activeEffects.speed.speedMultiplier : 1;
  recalculateBirdSize();
}

function getPipeSpeedMultiplier() {
  return speedMultiplier;
}

function normalizeEffectLabelForDeath(label) {
  if (!label || label === "None") {
    return "None";
  }

  if (label === "God Mode Ready" || label === "God Mode Activated") {
    return "God Mode";
  }

  if (label.startsWith("God Ready") || label.startsWith("God Mode Active")) {
    return "God Mode";
  }

  return label;
}

function rememberRoundEffect(label) {
  lastRoundEffectLabel = label;
}

function addGodModeCharge() {
  godModeCharges += 1;
  rememberRoundEffect("God Mode");
}

function rescueFromDeath(collisionInfo) {
  if (!collisionInfo) {
    bird.y = clamp(bird.y, bird.size, gameHeight - bird.size);
    bird.velocity = 0;
    return;
  }

  if (collisionInfo.type === "pipe" && collisionInfo.pipe) {
    const gapCenter = (collisionInfo.pipe.top + collisionInfo.pipe.bottom) * 0.5;
    bird.y = clamp(gapCenter, bird.size, gameHeight - bird.size);
    bird.velocity = 0;
    return;
  }

  if (collisionInfo.type === "boundary") {
    bird.y = clamp(bird.y, bird.size, gameHeight - bird.size);
    bird.velocity = 0;
  }
}

function activateGodModeShield(durationMs, collisionInfo) {
  if (godModeCharges <= 0) {
    return false;
  }

  godModeCharges -= 1;
  invincibleUntil = Date.now() + durationMs;
  rememberRoundEffect("God Mode");
  rescueFromDeath(collisionInfo);
  return true;
}

function hasGodModeActive() {
  return Date.now() < invincibleUntil;
}

function tryActivateGodModeShield(collisionInfo) {
  if (hasGodModeActive()) {
    rescueFromDeath(collisionInfo);
    return true;
  }
  return activateGodModeShield(GAME_CONFIG.godModeDurationMs, collisionInfo);
}

function applyRegularMysteryEffect(effectType) {
  const now = Date.now();

  const effectMap = {
    tiny: { slot: "size", label: "Tiny", sizeMultiplier: 0.67 },
    large: { slot: "size", label: "Large", sizeMultiplier: 1.5 },
    slow: {
      slot: "speed",
      label: "Slow",
      speedMultiplier: 0.5,
      durationMs: GAME_CONFIG.slowEffectDurationMs
    },
    fast: { slot: "speed", label: "Fast", speedMultiplier: 1.3 }
  };

  const effect = effectMap[effectType];
  if (!effect) return;

  const durationMs = effect.durationMs || GAME_CONFIG.regularEffectDurationMs;

  activeEffects[effect.slot] = {
    ...effect,
    type: effectType,
    expiresAt: now + durationMs
  };
  recalculateEffectMultipliers();
  rememberRoundEffect(effect.label);
}

function applyMysteryEffect() {
  const totalWeight = GAME_CONFIG.mysteryEffectWeights.reduce((sum, item) => sum + item.weight, 0);
  let roll = Math.random() * totalWeight;
  let chosen = GAME_CONFIG.mysteryEffectWeights[GAME_CONFIG.mysteryEffectWeights.length - 1];

  for (const item of GAME_CONFIG.mysteryEffectWeights) {
    roll -= item.weight;
    if (roll <= 0) {
      chosen = item;
      break;
    }
  }

  if (chosen.type === "god") {
    addGodModeCharge();
    return;
  }

  applyRegularMysteryEffect(chosen.type);
}

function maybeExpireEffect() {
  const now = Date.now();
  let changed = false;

  Object.keys(activeEffects).forEach(slot => {
    const effect = activeEffects[slot];
    if (effect && now >= effect.expiresAt) {
      activeEffects[slot] = null;
      changed = true;
    }
  });

  if (changed) {
    recalculateEffectMultipliers();
  }
}

function getCurrentEffectLabels(includeStateText) {
  const labels = [];

  if (hasGodModeActive()) {
    if (includeStateText) {
      const remainingSeconds = Math.max(0, Math.ceil((invincibleUntil - Date.now()) / 1000));
      labels.push("God Mode Active " + remainingSeconds + "s");
    } else {
      labels.push("God Mode");
    }
  }

  if (includeStateText && godModeCharges > 0) {
    labels.push("God Ready x" + godModeCharges);
  }

  [activeEffects.size, activeEffects.speed].forEach(effect => {
    if (effect) labels.push(effect.label);
  });

  return labels;
}

function getEffectLabelForDeath() {
  const activeLabels = getCurrentEffectLabels(false);
  if (activeLabels.length > 0) {
    return activeLabels.map(normalizeEffectLabelForDeath).join(" + ");
  }

  if (lastRoundEffectLabel && lastRoundEffectLabel !== "None") {
    return normalizeEffectLabelForDeath(lastRoundEffectLabel);
  }

  return "None";
}

function getActiveEffectLabel() {
  if (gameOver) {
    return deathEffectLabel || "None";
  }

  const labels = getCurrentEffectLabels(true);
  if (labels.length > 0) {
    return labels.join(" + ");
  }

  return "None";
}

function drawPausedOverlay() {

  ctx.textAlign = "center";

}


// ── Mystery box system ──────────────────────────────────────────────────────
function spawnMysteryBoxAt(x, y) {
  mysteryBox = {
    x,
    y,
    size: Math.round(clamp(34 * uiScale, 28, 42)),
    active: true
  };
}

function findBestMysterySpawnPoint() {
  const futurePipes = pipes
    .filter(pipe => pipe.x + pipe.width > bird.x + Math.round(80 * uiScale))
    .sort((a, b) => a.x - b.x);

  for (let i = 0; i < futurePipes.length - 1; i += 1) {
    const leftPipe = futurePipes[i];
    const rightPipe = futurePipes[i + 1];
    const centerX = (leftPipe.x + leftPipe.width + rightPipe.x) * 0.5;
    if (centerX > bird.x + Math.round(120 * uiScale) && centerX < gameWidth + Math.round(120 * uiScale)) {
      const leftGapCenterY = (leftPipe.top + leftPipe.bottom) * 0.5;
      const rightGapCenterY = (rightPipe.top + rightPipe.bottom) * 0.5;
      return {
        x: centerX,
        y: clamp((leftGapCenterY + rightGapCenterY) * 0.5, 60, gameHeight - 60)
      };
    }
  }

  const referencePipe = futurePipes[0] || pipes[pipes.length - 1];
  const fallbackY = referencePipe ? (referencePipe.top + referencePipe.bottom) * 0.5 : gameHeight * 0.5;
  return {
    x: gameWidth * 0.78,
    y: clamp(fallbackY, 60, gameHeight - 60)
  };
}

function maybeSpawnMysteryBoxForScore() {
  if (mysteryBox && mysteryBox.active) {
    return;
  }

  if (score < nextMysteryScoreThreshold) {
    return;
  }

  const point = findBestMysterySpawnPoint();
  spawnMysteryBoxAt(point.x, point.y);

  if (!firstMysteryQueued) {
    firstMysteryQueued = true;
    nextMysteryScoreThreshold = GAME_CONFIG.repeatMysteryStartScore;
  } else {
    nextMysteryScoreThreshold += GAME_CONFIG.repeatMysteryInterval;
  }
}

function maybeCollectMysteryBox() {
  if (!mysteryBox || !mysteryBox.active) {
    return;
  }

  const half = mysteryBox.size / 2;
  const withinX = bird.x + bird.size > mysteryBox.x - half && bird.x - bird.size < mysteryBox.x + half;
  const withinY = bird.y + bird.size > mysteryBox.y - half && bird.y - bird.size < mysteryBox.y + half;
  if (withinX && withinY) {
    mysteryBox.active = false;
    playMysteryCoinSound();
    applyMysteryEffect();
  }
}

function getBottomColumnLabel() {
  if (cloudScoresLoaded && cloudDailyLeaderKey) {
    return cloudDailyLeaderKey === "chubson" ? "SON" : "DOO";
  }

  const topEntry = getTopScores(1)[0];
  if (!topEntry || typeof topEntry.name !== "string") {
    return "DOO";
  }

  const winner = normalizedName(topEntry.name);
  if (winner === "chubson") {
    return "SON";
  }
  if (winner === "chubdoo") {
    return "DOO";
  }
  return "DOO";
}

// ── Score system ───────────────────────────────────────────────────────────
function loadTop3Forever() {
  try {
    const raw = localStorage.getItem(TOP3_FOREVER_KEY);
    const parsed = raw ? JSON.parse(raw) : [];
    if (!Array.isArray(parsed)) return [];
    const today = getDayString();
    return mergeScoreEntries(parsed.filter(entry => isScoreEntryFromDay(entry, today))).slice(0, 3);
  } catch {
    return [];
  }
}

function saveTop3Forever(entries) {
  localStorage.setItem(TOP3_FOREVER_KEY, JSON.stringify(entries));
}

function updateTop3Forever() {
  const forever = loadTop3Forever();
  const combined = mergeScoreEntries(scoreHistory, forever);
  saveTop3Forever(combined.slice(0, 3));
}

function loadScoreHistory() {
  try {
    const raw = localStorage.getItem(SCORE_HISTORY_KEY);
    const parsed = raw ? JSON.parse(raw) : [];
    if (!Array.isArray(parsed)) {
      return [];
    }

    const today = getDayString();
    const entries = parsed
      .filter(entry => isValidScoreEntry(entry) && isScoreEntryFromDay(entry, today))
      .slice(0, GAME_CONFIG.maxScoreHistoryEntries);

    // V30 daily-only scoreboard: merge only today's top records, never older days.
    return mergeScoreEntries(entries, loadTop3Forever()).slice(0, GAME_CONFIG.maxScoreHistoryEntries);
  } catch {
    return [];
  }
}

function saveScoreHistory() {
  localStorage.setItem(SCORE_HISTORY_KEY, JSON.stringify(scoreHistory.slice(0, GAME_CONFIG.maxScoreHistoryEntries)));
  updateTop3Forever();
  updatePerUserTop3Forever();
  saveCurrentUserScoreFile();
}

function purgeInactiveAccounts() {
  const now = Date.now();
  let changed = false;

  Object.keys(userAccounts).forEach(key => {
    const account = userAccounts[key];
    const activityIso = account.lastActivity || account.createdAt;
    if (!activityIso) return;
    const activityTime = new Date(activityIso).getTime();
    if (!Number.isFinite(activityTime)) return;
    if (isFixedUserKey(key)) return;
    if ((now - activityTime) / MS_PER_DAY > INACTIVITY_DAYS) {
      const userKey = normalizedName(account.userName);
      scoreHistory = scoreHistory.filter(entry => normalizedName(entry.name) !== userKey);
      localStorage.removeItem(getScoreFileKey(account.userName));
      delete spriteChoicesByUser[userKey];
      delete userAccounts[key];
      changed = true;
    }
  });

  if (changed) {
    saveUserAccounts();
    saveSpriteChoices();
    // Write purged history, then reload to re-merge top-3-forever records.
    localStorage.setItem(SCORE_HISTORY_KEY, JSON.stringify(scoreHistory.slice(0, GAME_CONFIG.maxScoreHistoryEntries)));
    scoreHistory = loadScoreHistory();
  }
}

// ── Daily date helpers ────────────────────────────────────────────────────────

function getDayString(date) {
  const d = date || new Date();
  return d.getFullYear() + "-" +
    String(d.getMonth() + 1).padStart(2, "0") + "-" +
    String(d.getDate()).padStart(2, "0");
}

function isScoreEntryFromDay(entry, dayString) {
  if (!entry || typeof entry.playedAt !== "string") {
    return false;
  }

  const playedAt = new Date(entry.playedAt);
  if (Number.isNaN(playedAt.getTime())) {
    return false;
  }

  return getDayString(playedAt) === dayString;
}

// ── Daily activity stats (per-user database stored in localStorage) ───────────

function loadDailyStats() {
  try {
    const raw = localStorage.getItem(DAILY_STATS_KEY);
    const parsed = raw ? JSON.parse(raw) : {};
    if (!parsed || typeof parsed !== "object" || Array.isArray(parsed)) return {};
    return parsed;
  } catch {
    return {};
  }
}

function saveDailyStats(stats) {
  // V30 daily-only scoreboard: keep only today's stats.
  const today = getDayString();
  Object.keys(stats).forEach(day => {
    if (day !== today) {
      delete stats[day];
    }
  });
  localStorage.setItem(DAILY_STATS_KEY, JSON.stringify(stats));
}

function recordDailyActivity(name, roundScore) {
  const stats = loadDailyStats();
  const today = getDayString();
  const userKey = normalizedName(name);
  if (!stats[today]) stats[today] = {};
  if (!stats[today][userKey]) {
    stats[today][userKey] = { userName: name, gamesPlayed: 0, highScore: 0, totalScore: 0 };
  }
  const entry = stats[today][userKey];
  entry.gamesPlayed += 1;
  entry.totalScore += roundScore;
  if (roundScore > entry.highScore) entry.highScore = roundScore;
  entry.userName = name;
  saveDailyStats(stats);
}

function getTodayStatsForPlayer(name) {
  const stats = loadDailyStats();
  const today = getDayString();
  return (stats[today] && stats[today][normalizedName(name)]) || null;
}


// ── Total points battle stats ───────────────────────────────────────────────

function createEmptyTotalPointsByUser() {
  return {
    chubson: { userName: "Chubson", totalPoints: 0, gamesPlayed: 0 },
    chubdoo: { userName: "Chubdoo", totalPoints: 0, gamesPlayed: 0 }
  };
}

function loadTotalPointsByUser() {
  const totals = createEmptyTotalPointsByUser();

  // V30 daily-only scoreboard: old total-points battle data expires at midnight.
  if (localStorage.getItem(TOTAL_POINTS_DATE_KEY) !== getDayString()) {
    return totals;
  }

  try {
    const raw = localStorage.getItem(TOTAL_POINTS_BY_USER_KEY);
    const parsed = raw ? JSON.parse(raw) : {};
    if (!parsed || typeof parsed !== "object" || Array.isArray(parsed)) {
      return totals;
    }

    Object.keys(totals).forEach(userKey => {
      const saved = parsed[userKey];
      if (typeof saved === "number") {
        totals[userKey].totalPoints = Math.max(0, Math.floor(saved));
        return;
      }
      if (saved && typeof saved === "object") {
        totals[userKey].totalPoints = Math.max(0, Math.floor(Number(saved.totalPoints) || 0));
        totals[userKey].gamesPlayed = Math.max(0, Math.floor(Number(saved.gamesPlayed) || 0));
      }
    });
  } catch {
    return totals;
  }

  return totals;
}

function saveTotalPointsByUser(totals) {
  localStorage.setItem(TOTAL_POINTS_BY_USER_KEY, JSON.stringify(totals));
  localStorage.setItem(TOTAL_POINTS_DATE_KEY, getDayString());
}

function updateTotalPointsForPlayer(name, roundScore) {
  const userKey = getUserKey(name);
  if (!isFixedUserKey(userKey)) {
    return;
  }

  const totals = loadTotalPointsByUser();
  if (!totals[userKey]) {
    totals[userKey] = {
      userName: FIXED_USER_ACCOUNTS[userKey].userName,
      totalPoints: 0,
      gamesPlayed: 0
    };
  }

  totals[userKey].userName = FIXED_USER_ACCOUNTS[userKey].userName;
  totals[userKey].totalPoints += Math.max(0, Math.floor(Number(roundScore) || 0));
  totals[userKey].gamesPlayed += 1;
  saveTotalPointsByUser(totals);
}

function getTotalPointsChartData() {
  if (cloudScoresLoaded) {
    return ["chubson", "chubdoo"].map(userKey => {
      const daily = cloudDailyTotals[userKey] || createEmptyCloudDailyTotals()[userKey];
      const lifetime = cloudLifetimeTotals[userKey] || createEmptyCloudLifetimeTotals()[userKey];
      return {
        userKey,
        userName: FIXED_USER_ACCOUNTS[userKey].userName,
        totalPoints: daily.totalPoints || 0,
        gamesPlayed: daily.gamesPlayed || 0,
        highScore: daily.highScore || 0,
        lifetimePoints: lifetime.lifetimePoints || 0,
        lifetimeGames: lifetime.lifetimeGames || 0,
        lifetimeHighScore: lifetime.lifetimeHighScore || 0
      };
    });
  }

  const totals = loadTotalPointsByUser();
  return ["chubson", "chubdoo"].map(userKey => ({
    userKey,
    userName: totals[userKey].userName,
    totalPoints: totals[userKey].totalPoints || 0,
    gamesPlayed: totals[userKey].gamesPlayed || 0,
    lifetimePoints: 0,
    lifetimeGames: 0,
    lifetimeHighScore: 0
  }));
}

function getTotalBattlePoints() {
  return getTotalPointsChartData().reduce((sum, item) => sum + item.totalPoints, 0);
}


function initializeTotalPointsFromKnownScores() {
  if (localStorage.getItem(TOTAL_POINTS_BY_USER_KEY) && localStorage.getItem(TOTAL_POINTS_DATE_KEY) === getDayString()) {
    return;
  }

  const totals = createEmptyTotalPointsByUser();
  const today = getDayString();
  scoreHistory
    .filter(entry => isValidScoreEntry(entry) && isScoreEntryFromDay(entry, today))
    .forEach(entry => {
      const userKey = getUserKey(entry.name);
      if (!isFixedUserKey(userKey)) {
        return;
      }
      totals[userKey].totalPoints += Math.max(0, Math.floor(Number(entry.score) || 0));
      totals[userKey].gamesPlayed += 1;
    });
  saveTotalPointsByUser(totals);
}

// ── Midnight score reset ──────────────────────────────────────────────────────

function clearScoreDataForNewDay() {
  // V30 daily-only scoreboard: reset all score and pie-chart data at local midnight.
  localStorage.setItem(SCORE_HISTORY_KEY, JSON.stringify([]));
  localStorage.setItem(TOP3_FOREVER_KEY, JSON.stringify([]));
  localStorage.setItem(PER_USER_TOP3_FOREVER_KEY, JSON.stringify({}));
  localStorage.setItem(DAILY_STATS_KEY, JSON.stringify({}));
  localStorage.removeItem(TOTAL_POINTS_BY_USER_KEY);
  localStorage.removeItem(TOTAL_POINTS_DATE_KEY);
  getLocalStorageKeys(SCORE_FILE_PREFIX).forEach(key => localStorage.removeItem(key));
  scoreHistory = [];
}

function maybeResetScoresNightly() {
  const today = getDayString();
  const lastReset = localStorage.getItem(LAST_RESET_DATE_KEY) || "";

  if (!lastReset) {
    // First run under the daily-only system: mark today without clearing current play.
    localStorage.setItem(LAST_RESET_DATE_KEY, today);
  } else if (lastReset !== today) {
    clearScoreDataForNewDay();
    localStorage.setItem(LAST_RESET_DATE_KEY, today);
    initializeTotalPointsFromKnownScores();
    saveCurrentUserScoreFile();
    renderScoreHistory();
  }

  // Schedule next check 5 s after the next calendar midnight.
  const now = new Date();
  const nextMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 5);
  setTimeout(maybeResetScoresNightly, nextMidnight.getTime() - now.getTime());
}

function escapeHtml(value) {
  return String(value == null ? "" : value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function formatScoreTimeOnly(isoTime) {
  const date = new Date(isoTime);
  if (Number.isNaN(date.getTime())) {
    return "Unknown";
  }
  return date.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}

function getTodaySummaryForModal(rows) {

    const userKey = getUserKey(row && (row.name || row.player_name || row.player_key || ""));
    if (!isFixedUserKey(userKey)) {

    const points = Math.max(0, Math.floor(Number(row.score) || 0));
    summary[userKey].totalPoints += points;
    summary[userKey].gamesPlayed += 1;
    summary[userKey].highScore = Math.max(summary[userKey].highScore || 0, points);

  return summary;
}

let pingAudioContext = null;

function getPingAudioContext() {
  const AudioContextClass = window.AudioContext || window.webkitAudioContext;
  if (!AudioContextClass) {
    return null;
  }

  if (!pingAudioContext) {
    pingAudioContext = new AudioContextClass();
  }

  if (pingAudioContext.state === "suspended") {
    pingAudioContext.resume().catch(() => {});
  }

  return pingAudioContext;
}

function playTapPingSound() {
  const audioContext = getPingAudioContext();
  if (!audioContext) {
    return;
  }

  const now = audioContext.currentTime;
  const oscillator = audioContext.createOscillator();
  const gain = audioContext.createGain();

  oscillator.type = "sine";
  oscillator.frequency.setValueAtTime(880, now);
  oscillator.frequency.exponentialRampToValueAtTime(1320, now + 0.035);

  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(0.14, now + 0.008);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.11);

  oscillator.connect(gain);
  gain.connect(audioContext.destination);

  oscillator.start(now);
  oscillator.stop(now + 0.12);
}

function playMysteryCoinSound() {
  const audioContext = getPingAudioContext();
  if (!audioContext) {
    return;
  }

  const now = audioContext.currentTime;
  const masterGain = audioContext.createGain();
  masterGain.gain.setValueAtTime(0.0001, now);
  masterGain.gain.exponentialRampToValueAtTime(0.22, now + 0.015);
  masterGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.62);
  masterGain.connect(audioContext.destination);

  const coinNotes = [1046, 1318, 1567, 1760, 2093, 2349, 2637];
  for (let i = 0; i < 9; i += 1) {
    const start = now + i * 0.045 + Math.random() * 0.025;
    const duration = 0.10 + Math.random() * 0.08;
    const oscillator = audioContext.createOscillator();
    const gain = audioContext.createGain();
    const frequency = coinNotes[Math.floor(Math.random() * coinNotes.length)] * (0.92 + Math.random() * 0.18);

    oscillator.type = i % 3 === 0 ? "triangle" : "sine";
    oscillator.frequency.setValueAtTime(frequency, start);
    oscillator.frequency.exponentialRampToValueAtTime(frequency * (1.15 + Math.random() * 0.18), start + duration * 0.4);

    gain.gain.setValueAtTime(0.0001, start);
    gain.gain.exponentialRampToValueAtTime(0.11 + Math.random() * 0.07, start + 0.008);
    gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);

    oscillator.connect(gain);
    gain.connect(masterGain);
    oscillator.start(start);
    oscillator.stop(start + duration + 0.02);
  }

  const lowCoin = audioContext.createOscillator();
  const lowCoinGain = audioContext.createGain();
  lowCoin.type = "square";
  lowCoin.frequency.setValueAtTime(392, now + 0.02);
  lowCoin.frequency.exponentialRampToValueAtTime(740, now + 0.18);
  lowCoinGain.gain.setValueAtTime(0.0001, now + 0.02);
  lowCoinGain.gain.exponentialRampToValueAtTime(0.07, now + 0.04);
  lowCoinGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.24);
  lowCoin.connect(lowCoinGain);
  lowCoinGain.connect(masterGain);
  lowCoin.start(now + 0.02);
  lowCoin.stop(now + 0.26);
}
