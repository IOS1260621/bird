<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>InventorPath Flappy Game</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
    }
    body {
      margin: 0;
      overflow: hidden;
      background: #87ceeb;
      font-family: Arial, sans-serif;
      touch-action: none;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
    }
    canvas {
      display: block;
      margin: auto;
      width: 100vw;
      height: 100dvh;
      background: linear-gradient(#70c5ce, #ffffff);
    }
    .hud-panel {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      width: min(88vw, 340px);
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.16);
      touch-action: auto;
      pointer-events: auto;
    }
    .hud-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }
    .hud-row label {
      font-size: 13px;
      font-weight: 700;
      color: #111827;
      white-space: nowrap;
    }
    .hud-row input {
      flex: 1;
      font-size: 14px;
      padding: 7px 9px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      outline: none;
      min-width: 0;
    }
    .hud-row input:focus {
      border-color: #0284c7;
      box-shadow: 0 0 0 2px rgba(2, 132, 199, 0.2);
    }
    .hud-row select {
      flex: 1;
      font-size: 14px;
      padding: 7px 9px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      outline: none;
      min-width: 0;
      background: #ffffff;
    }
    .hud-row select:focus {
      border-color: #0284c7;
      box-shadow: 0 0 0 2px rgba(2, 132, 199, 0.2);
    }
    .sprite-hint {
      margin-top: -2px;
      margin-bottom: 8px;
      color: #475569;
      font-size: 11px;
      line-height: 1.2;
    }
    .score-list-title {
      font-size: 12px;
      font-weight: 700;
      color: #334155;
      margin-bottom: 6px;
    }
    .score-list {
      margin: 0;
      padding-left: 18px;
      max-height: min(35vh, 260px);
      overflow-y: auto;
      color: #111827;
      font-size: 12px;
    }
    .score-list li {
      margin: 0 0 4px;
      line-height: 1.25;
    }
    .hud-actions {
      margin-top: 10px;
    }
    .start-button {
      width: 100%;
      border: 0;
      border-radius: 10px;
      background: #0284c7;
      color: #ffffff;
      font-size: 14px;
      font-weight: 700;
      padding: 10px 12px;
      cursor: pointer;
    }
    .start-button:active {
      transform: translateY(1px);
    }
    .secondary-button {
      width: 100%;
      border: 1px solid #94a3b8;
      border-radius: 10px;
      background: #ffffff;
      color: #0f172a;
      font-size: 13px;
      font-weight: 700;
      padding: 9px 12px;
      cursor: pointer;
      margin-top: 6px;
    }
    .secondary-button:active {
      transform: translateY(1px);
    }
    .auth-status {
      font-size: 12px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 8px;
      line-height: 1.25;
    }
    .auth-note {
      color: #475569;
      font-size: 11px;
      line-height: 1.25;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
<div class="hud-panel" id="hudPanel">
  <div class="auth-status" id="authStatus">Sign in or create a player account.</div>
  <div class="auth-note">This static web version saves accounts and top 3 scores in this browser. Use Download Score File to export a JSON file.</div>
  <div class="hud-row">
    <label for="playerNameInput">User</label>
    <input id="playerNameInput" type="text" maxlength="20" placeholder="User name">
  </div>
  <div class="hud-row">
    <label for="passwordInput">Pass</label>
    <input id="passwordInput" type="password" maxlength="30" placeholder="Password">
  </div>
  <div class="hud-actions">
    <button class="secondary-button" id="createAccountButton" type="button">Create New User</button>
    <button class="secondary-button" id="loginButton" type="button">Log In</button>
    <button class="secondary-button" id="logoutButton" type="button" style="display:none;">Log Out</button>
    <button class="secondary-button" id="downloadScoreFileButton" type="button" style="display:none;">Download My Score File</button>
  </div>
  <div class="hud-row" id="spritePickerRow" style="display:none;">
    <label for="spritePicker">Bruce</label>
    <select id="spritePicker"></select>
  </div>
  <div class="sprite-hint" id="spriteHint" style="display:none;">Top scorer can choose the Bruce image.</div>
  <div class="score-list-title" id="scoreListTitle">Recent scores</div>
  <ol class="score-list" id="scoreList"></ol>
  <div class="hud-actions">
    <button class="start-button" id="startGameButton" type="button">Start Game</button>
  </div>
</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const hudPanel = document.getElementById("hudPanel");
const playerNameInput = document.getElementById("playerNameInput");
const spritePickerRow = document.getElementById("spritePickerRow");
const spritePicker = document.getElementById("spritePicker");
const spriteHint = document.getElementById("spriteHint");
const scoreList = document.getElementById("scoreList");
const scoreListTitle = document.getElementById("scoreListTitle");
const startGameButton = document.getElementById("startGameButton");
const passwordInput = document.getElementById("passwordInput");
const authStatus = document.getElementById("authStatus");
const createAccountButton = document.getElementById("createAccountButton");
const loginButton = document.getElementById("loginButton");
const logoutButton = document.getElementById("logoutButton");
const downloadScoreFileButton = document.getElementById("downloadScoreFileButton");
const ctGantryImage = new Image();

const DEFAULT_DOG_SPRITE = "bruce.png";
const AVAILABLE_DOG_SPRITES = ["bruce.png", "dog.svg", "gooboybruce.PNG", "smileB.png"];

// Version 2: preload all player sprites once and switch by name.
// This prevents iPhone/GitHub Pages timing/caching issues where the selector
// changed but the displayed Bruce image did not update reliably.
const spriteImages = {};
let currentSprite = DEFAULT_DOG_SPRITE;

AVAILABLE_DOG_SPRITES.forEach(spriteName => {
  const img = new Image();
  img.onload = () => {
    // Redraw immediately after a sprite finishes loading.
    draw();
  };
  img.onerror = () => {
    console.warn("Missing or failed sprite image:", spriteName);
  };
  img.src = spriteName;
  spriteImages[spriteName] = img;
});

ctGantryImage.src = "ct-gantry.svg";

const PLAYER_NAME_KEY = "inventorpath_player_name";
const PLAYER_NAME_SET_KEY = "inventorpath_player_name_set";
const SCORE_HISTORY_KEY = "inventorpath_score_history";
const SPRITE_CHOICES_KEY = "inventorpath_sprite_choices";
const USER_ACCOUNTS_KEY = "inventorpath_user_accounts";
const ACTIVE_USER_KEY = "inventorpath_active_user";
const SCORE_FILE_PREFIX = "inventorpath_score_file_";

let gameWidth = 0;
let gameHeight = 0;
let uiScale = 1;

let pipes = [];
let score = 0;
let gameStarted = false;
let gameOver = false;
let scoreSavedForRound = false;
let lastSavedEntry = null;
let totalPipesCreated = 0;
let mysteryBox = null;
let mysteryPlans = [];
let nextRecurringMysteryThreshold = 70;
let activeEffect = null;
let speedMultiplier = 1;
let sizeMultiplier = 1;
let gapMultiplier = 1;
let godModeCharges = 0;
let invincibleUntil = 0;

function sanitizeName(name) {
  const trimmed = name.trim().replace(/\s+/g, " ");
  return trimmed.slice(0, 20);
}

function sanitizeUsername(name) {
  return sanitizeName(name).replace(/[^a-zA-Z0-9 _.-]/g, "");
}

function getUserKey(name) {
  return sanitizeUsername(name).toLowerCase();
}

function loadUserAccounts() {
  try {
    const raw = localStorage.getItem(USER_ACCOUNTS_KEY);
    const parsed = raw ? JSON.parse(raw) : {};
    if (!parsed || typeof parsed !== "object" || Array.isArray(parsed)) {
      return {};
    }
    return parsed;
  } catch {
    return {};
  }
}

function saveUserAccounts() {
  localStorage.setItem(USER_ACCOUNTS_KEY, JSON.stringify(userAccounts));
}

function getScoreFileKey(name) {
  return SCORE_FILE_PREFIX + getUserKey(name);
}

function getTopThreeScoresForUser(name) {
  return getScoresForPlayer(name).slice(0, 3);
}

function saveCurrentUserScoreFile() {
  if (!activeUserName) {
    return;
  }

  const scoreFile = {
    userName: playerName,
    updatedAt: new Date().toISOString(),
    top3Scores: getTopThreeScoresForUser(playerName).map(entry => ({
      score: entry.score,
      playedAt: entry.playedAt
    }))
  };

  localStorage.setItem(getScoreFileKey(playerName), JSON.stringify(scoreFile, null, 2));
}

function loadCurrentUserScoreFile() {
  if (!activeUserName) {
    return null;
  }

  try {
    const raw = localStorage.getItem(getScoreFileKey(playerName));
    return raw ? JSON.parse(raw) : null;
  } catch {
    return null;
  }
}

function downloadCurrentUserScoreFile() {
  if (!activeUserName) {
    alert("Log in first.");
    return;
  }

  saveCurrentUserScoreFile();
  const raw = localStorage.getItem(getScoreFileKey(playerName)) || "{}";
  const blob = new Blob([raw], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = playerName.replace(/[^a-zA-Z0-9_-]/g, "_") + "_top3_scores.json";
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
}

function renderAuthStatus() {
  if (activeUserName) {
    authStatus.textContent = "Logged in as " + playerName;
    loginButton.style.display = "none";
    createAccountButton.style.display = "none";
    logoutButton.style.display = "block";
    downloadScoreFileButton.style.display = "block";
    startGameButton.disabled = false;
    startGameButton.style.opacity = "1";
  } else {
    authStatus.textContent = "Sign in or create a player account.";
    loginButton.style.display = "block";
    createAccountButton.style.display = "block";
    logoutButton.style.display = "none";
    downloadScoreFileButton.style.display = "none";
    startGameButton.disabled = true;
    startGameButton.style.opacity = "0.55";
  }
}

function createAccount() {
  const name = sanitizeUsername(playerNameInput.value);
  const password = passwordInput.value;
  const userKey = getUserKey(name);

  if (!name || !password) {
    alert("Enter a user name and password.");
    return;
  }

  if (userAccounts[userKey]) {
    alert("That user already exists. Use Log In instead.");
    return;
  }

  // Static HTML version: password is stored locally in this browser only.
  // This is not bank-level security, but it creates separate local player accounts.
  userAccounts[userKey] = {
    userName: name,
    password: password,
    createdAt: new Date().toISOString()
  };
  saveUserAccounts();

  activeUserName = name;
  playerName = name;
  hasSetPlayerName = true;
  localStorage.setItem(ACTIVE_USER_KEY, activeUserName);
  localStorage.setItem(PLAYER_NAME_KEY, playerName);
  localStorage.setItem(PLAYER_NAME_SET_KEY, "1");
  playerNameInput.value = playerName;
  passwordInput.value = "";
  saveCurrentUserScoreFile();
  renderScoreHistory();
  renderAuthStatus();
  applyCurrentPlayerSprite();
  updateHudVisibility();
}

function loginAccount() {
  const name = sanitizeUsername(playerNameInput.value);
  const password = passwordInput.value;
  const userKey = getUserKey(name);
  const account = userAccounts[userKey];

  if (!account || account.password !== password) {
    alert("Incorrect user name or password.");
    return;
  }

  activeUserName = account.userName;
  playerName = account.userName;
  hasSetPlayerName = true;
  localStorage.setItem(ACTIVE_USER_KEY, activeUserName);
  localStorage.setItem(PLAYER_NAME_KEY, playerName);
  localStorage.setItem(PLAYER_NAME_SET_KEY, "1");
  playerNameInput.value = playerName;
  passwordInput.value = "";
  renderScoreHistory();
  renderAuthStatus();
  applyCurrentPlayerSprite();
  updateHudVisibility();
}

function logoutAccount() {
  activeUserName = "";
  playerName = "Player";
  hasSetPlayerName = false;
  localStorage.removeItem(ACTIVE_USER_KEY);
  localStorage.removeItem(PLAYER_NAME_SET_KEY);
  playerNameInput.value = "";
  passwordInput.value = "";
  gameStarted = false;
  gameOver = false;
  renderScoreHistory();
  renderAuthStatus();
  updateStartButtonLabel();
  updateHudVisibility();
}

function loadSpriteChoices() {
  try {
    const raw = localStorage.getItem(SPRITE_CHOICES_KEY);
    const parsed = raw ? JSON.parse(raw) : {};
    if (!parsed || typeof parsed !== "object" || Array.isArray(parsed)) {
      return {};
    }
    return parsed;
  } catch {
    return {};
  }
}

let userAccounts = loadUserAccounts();
let activeUserName = sanitizeUsername(localStorage.getItem(ACTIVE_USER_KEY) || "");
if (activeUserName && !userAccounts[getUserKey(activeUserName)]) {
  activeUserName = "";
  localStorage.removeItem(ACTIVE_USER_KEY);
}

let playerName = activeUserName || "Player";
let hasSetPlayerName = Boolean(activeUserName);
let scoreHistory = [];
let spriteChoicesByUser = loadSpriteChoices();

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function setCanvasSize() {
  // Match iPhone's dynamic viewport height and render sharply on retina screens.
  gameWidth = window.innerWidth;
  gameHeight = window.innerHeight;

  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.style.width = gameWidth + "px";
  canvas.style.height = gameHeight + "px";
  canvas.width = Math.floor(gameWidth * dpr);
  canvas.height = Math.floor(gameHeight * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  uiScale = clamp(Math.min(gameWidth / 390, gameHeight / 844), 0.85, 1.2);
}

setCanvasSize();

let bird = {
  x: 0,
  y: gameHeight / 2,
  baseSize: 24,
  size: 24,
  velocity: 0,
  gravity: 0.45,
  jump: -8
};

bird.x = Math.max(70, Math.min(100, gameWidth * 0.2));

function recalculateBirdSize() {
  bird.size = Math.max(0, Math.round(bird.baseSize * sizeMultiplier));
}

function applyPhysicsTuning() {
  bird.baseSize = Math.round(clamp(gameWidth * 0.032, 20, 26));
  recalculateBirdSize();
  bird.gravity = clamp(0.4 + gameHeight / 5000, 0.42, 0.56);
  bird.jump = -clamp(7.6 + gameHeight / 980, 7.8, 8.9);
}

applyPhysicsTuning();

function formatPlayedAt(isoTime) {
  const date = new Date(isoTime);
  if (Number.isNaN(date.getTime())) {
    return "Unknown time";
  }
  return date.toLocaleString();
}

function formatPlayedAtShort(isoTime) {
  const date = new Date(isoTime);
  if (Number.isNaN(date.getTime())) {
    return "Unknown";
  }

  const datePart = date.toLocaleDateString();
  const timePart = date.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  return datePart + " " + timePart;
}

function normalizedName(name) {
  return sanitizeName(name).toLowerCase();
}

function getScoresForPlayer(name) {
  const nameKey = normalizedName(name);
  return scoreHistory
    .filter(entry => normalizedName(entry.name) === nameKey)
    .sort((a, b) => {
      if (b.score !== a.score) {
        return b.score - a.score;
      }
      return new Date(b.playedAt).getTime() - new Date(a.playedAt).getTime();
    });
}

function getTopScores(limit) {
  return scoreHistory
    .slice()
    .sort((a, b) => {
      if (b.score !== a.score) {
        return b.score - a.score;
      }
      return new Date(b.playedAt).getTime() - new Date(a.playedAt).getTime();
    })
    .slice(0, limit);
}

function saveSpriteChoices() {
  localStorage.setItem(SPRITE_CHOICES_KEY, JSON.stringify(spriteChoicesByUser));
}

function isCurrentPlayerTopScorer() {
  const topEntry = getTopScores(1)[0];
  return Boolean(topEntry) && normalizedName(topEntry.name) === normalizedName(playerName);
}

function getCurrentPlayerSpriteChoice() {
  const storedChoice = spriteChoicesByUser[normalizedName(playerName)];
  if (AVAILABLE_DOG_SPRITES.includes(storedChoice)) {
    return storedChoice;
  }
  return DEFAULT_DOG_SPRITE;
}

function applyCurrentPlayerSprite() {
  if (isCurrentPlayerTopScorer()) {
    const chosen = getCurrentPlayerSpriteChoice();
    currentSprite = chosen;
    spritePicker.value = chosen;
    spritePickerRow.style.display = "flex";
    spriteHint.style.display = "block";
  } else {
    currentSprite = DEFAULT_DOG_SPRITE;
    spritePicker.value = DEFAULT_DOG_SPRITE;
    spritePickerRow.style.display = "none";
    spriteHint.style.display = "none";
  }
}

function getPipeSpeedMultiplier() {
  return speedMultiplier;
}

function clearTimedEffect() {
  activeEffect = null;
  speedMultiplier = 1;
  sizeMultiplier = 1;
  gapMultiplier = 1;
  recalculateBirdSize();
}

function applyMysteryEffect() {
  const roll = Math.random();
  const now = Date.now();
  const bucket = 0.1583;

  clearTimedEffect();

  if (roll < bucket) {
    // Decrease Bruce size by 100% (effectively invisible) for 10s.
    sizeMultiplier = 0;
    recalculateBirdSize();
    activeEffect = { type: "tiny", expiresAt: now + 10000 };
    return;
  }

  if (roll < bucket * 2) {
    sizeMultiplier = 1.8;
    recalculateBirdSize();
    activeEffect = { type: "large", expiresAt: now + 10000 };
    return;
  }

  if (roll < bucket * 3) {
    speedMultiplier = 0.5;
    activeEffect = { type: "slow", expiresAt: now + 10000 };
    return;
  }

  if (roll < bucket * 4) {
    speedMultiplier = 1.3;
    activeEffect = { type: "fast", expiresAt: now + 10000 };
    return;
  }

  if (roll < bucket * 5) {
    gapMultiplier = 0.8;
    activeEffect = { type: "s-gap", expiresAt: now + 10000 };
    return;
  }

  if (roll < bucket * 6) {
    gapMultiplier = 1.3;
    activeEffect = { type: "b-gap", expiresAt: now + 10000 };
    return;
  }

  // One free collision pass that remains until used.
  godModeCharges = 1;
}

function maybeExpireEffect() {
  if (activeEffect && Date.now() >= activeEffect.expiresAt) {
    clearTimedEffect();
  }
}

function randomMysteryLaneY() {
  const lanes = [0.35, 0.65];
  return gameHeight * lanes[Math.random() < 0.5 ? 0 : 1];
}

function hasMysteryPlanForThreshold(threshold) {
  return mysteryPlans.some(plan => plan.threshold === threshold);
}

function queueMysteryPlan(threshold, targetPipeId) {
  mysteryPlans.push({
    threshold,
    targetPipeId,
    y: randomMysteryLaneY()
  });
}

function maybeQueueMysteryPlans() {
  if (score >= 25 && !hasMysteryPlanForThreshold(25)) {
    queueMysteryPlan(25, 27);
  }

  if (score >= 40 && !hasMysteryPlanForThreshold(40)) {
    queueMysteryPlan(40, 44);
  }

  while (score >= nextRecurringMysteryThreshold) {
    // After 40, spawn a new mystery box every +30 score forever.
    queueMysteryPlan(nextRecurringMysteryThreshold, totalPipesCreated + 3);
    nextRecurringMysteryThreshold += 30;
  }
}

function spawnMysteryBoxAt(x, y) {
  mysteryBox = {
    x,
    y,
    size: Math.round(clamp(34 * uiScale, 28, 42)),
    active: true
  };
}

function maybeSpawnMysteryBoxFromPlans() {
  if (mysteryBox && mysteryBox.active) {
    return;
  }

  if (mysteryPlans.length === 0) {
    return;
  }

  const plan = mysteryPlans[0];
  const leftPipe = pipes.find(pipe => pipe.id === plan.targetPipeId - 1);
  const rightPipe = pipes.find(pipe => pipe.id === plan.targetPipeId);

  if (leftPipe && rightPipe) {
    const centerX = (leftPipe.x + leftPipe.width + rightPipe.x) * 0.5;
    spawnMysteryBoxAt(centerX, plan.y);
    mysteryPlans.shift();
    return;
  }

  // Fallback if anchored columns have already passed the viewport.
  if (pipes.length > 0 && pipes[0].id > plan.targetPipeId) {
    spawnMysteryBoxAt(gameWidth * 0.56, plan.y);
    mysteryPlans.shift();
  }
}

function maybeCollectMysteryBox() {
  if (!mysteryBox || !mysteryBox.active) {
    return;
  }

  const half = mysteryBox.size / 2;
  const withinX = bird.x + bird.size > mysteryBox.x - half && bird.x - bird.size < mysteryBox.x + half;
  const withinY = bird.y + bird.size > mysteryBox.y - half && bird.y - bird.size < mysteryBox.y + half;
  if (withinX && withinY) {
    mysteryBox.active = false;
    applyMysteryEffect();
  }
}

function getBottomColumnLabel() {
  const topEntry = getTopScores(1)[0];
  if (!topEntry || typeof topEntry.name !== "string") {
    return "DOO";
  }

  const winner = normalizedName(topEntry.name);
  if (winner === "chubson") {
    return "SON";
  }
  if (winner === "chubdoo") {
    return "DOO";
  }
  return "DOO";
}

function loadScoreHistory() {
  try {
    const raw = localStorage.getItem(SCORE_HISTORY_KEY);
    const parsed = raw ? JSON.parse(raw) : [];
    if (!Array.isArray(parsed)) {
      return [];
    }

    return parsed
      .filter(entry => entry && typeof entry.name === "string" && Number.isFinite(entry.score) && typeof entry.playedAt === "string")
      .slice(0, 100);
  } catch {
    return [];
  }
}

function saveScoreHistory() {
  localStorage.setItem(SCORE_HISTORY_KEY, JSON.stringify(scoreHistory.slice(0, 100)));
  saveCurrentUserScoreFile();
}

function renderScoreHistory() {
  scoreList.innerHTML = "";

  if (!activeUserName) {
    scoreListTitle.textContent = "Player login required";
    const emptyItem = document.createElement("li");
    emptyItem.textContent = "Create a user or log in to save scores.";
    scoreList.appendChild(emptyItem);
    return;
  }

  scoreListTitle.textContent = "Top 3 scores for " + playerName;
  const playerScores = getTopThreeScoresForUser(playerName);

  if (playerScores.length === 0) {
    const emptyItem = document.createElement("li");
    emptyItem.textContent = "No games yet for this player";
    scoreList.appendChild(emptyItem);
    return;
  }

  playerScores.forEach((entry, index) => {
    const item = document.createElement("li");
    item.textContent = "#" + (index + 1) + " - " + entry.score + " points - " + formatPlayedAt(entry.playedAt);
    scoreList.appendChild(item);
  });

  applyCurrentPlayerSprite();
}

function updateStartButtonLabel() {
  startGameButton.textContent = gameOver ? "Play Again" : "Start Game";
}

function updateHudVisibility() {
  hudPanel.style.display = !gameStarted || gameOver || !activeUserName ? "block" : "none";
}

function resetRoundState() {
  bird.y = gameHeight / 2;
  bird.velocity = 0;
  pipes = [];
  score = 0;
  gameOver = false;
  scoreSavedForRound = false;
  lastSavedEntry = null;
  totalPipesCreated = 0;
  mysteryBox = null;
  mysteryPlans = [];
  nextRecurringMysteryThreshold = 70;
  godModeCharges = 0;
  invincibleUntil = 0;
  clearTimedEffect();
}

function startGame() {
  applyPlayerNameFromInput();
  if (!activeUserName) {
    alert("Create a user or log in before starting the game.");
    return;
  }
  resetRoundState();
  gameStarted = true;
  updateStartButtonLabel();
  updateHudVisibility();
}

function applyPlayerNameFromInput() {
  if (!activeUserName) {
    renderScoreHistory();
    renderAuthStatus();
    updateHudVisibility();
    return;
  }

  playerName = activeUserName;
  hasSetPlayerName = true;
  playerNameInput.value = playerName;
  localStorage.setItem(PLAYER_NAME_KEY, playerName);
  localStorage.setItem(PLAYER_NAME_SET_KEY, "1");
  renderScoreHistory();
  renderAuthStatus();
  applyCurrentPlayerSprite();
  updateHudVisibility();
}

function persistCurrentScore() {
  if (scoreSavedForRound) {
    return;
  }

  scoreSavedForRound = true;
  lastSavedEntry = {
    name: playerName,
    score,
    playedAt: new Date().toISOString()
  };
  scoreHistory.unshift(lastSavedEntry);
  scoreHistory = scoreHistory.slice(0, 100);
  saveScoreHistory();
  renderScoreHistory();
  applyCurrentPlayerSprite();
}

function setGameOver() {
  if (gameOver) {
    return;
  }
  gameOver = true;
  persistCurrentScore();
  updateStartButtonLabel();
  updateHudVisibility();
}

playerNameInput.value = activeUserName ? playerName : "";
playerNameInput.addEventListener("keydown", event => {
  if (event.key === "Enter") {
    passwordInput.focus();
  }
});
passwordInput.addEventListener("keydown", event => {
  if (event.key === "Enter") {
    if (activeUserName) {
      startGame();
    } else {
      loginAccount();
    }
  }
});
createAccountButton.addEventListener("click", createAccount);
loginButton.addEventListener("click", loginAccount);
logoutButton.addEventListener("click", logoutAccount);
downloadScoreFileButton.addEventListener("click", downloadCurrentUserScoreFile);
spritePicker.addEventListener("change", () => {
  if (!isCurrentPlayerTopScorer()) {
    spritePicker.value = DEFAULT_DOG_SPRITE;
    currentSprite = DEFAULT_DOG_SPRITE;
    return;
  }

  const chosen = AVAILABLE_DOG_SPRITES.includes(spritePicker.value) ? spritePicker.value : DEFAULT_DOG_SPRITE;
  spriteChoicesByUser[normalizedName(playerName)] = chosen;
  saveSpriteChoices();
  currentSprite = chosen;
});
startGameButton.addEventListener("click", startGame);

AVAILABLE_DOG_SPRITES.forEach(spriteName => {
  const option = document.createElement("option");
  option.value = spriteName;
  option.textContent = spriteName;
  spritePicker.appendChild(option);
});

scoreHistory = loadScoreHistory();
saveCurrentUserScoreFile();
renderScoreHistory();
renderAuthStatus();
applyCurrentPlayerSprite();
updateStartButtonLabel();
updateHudVisibility();

function flap() {
  if (!gameStarted || gameOver) {
    return;
  }

  // Keep taps responsive without stacking overly strong upward boosts.
  bird.velocity = Math.min(bird.velocity, bird.jump);
}

window.addEventListener("pointerdown", event => {
  if (hudPanel.contains(event.target)) {
    return;
  }

  if (event.isPrimary) {
    event.preventDefault();
    flap();
  }
}, { passive: false });

document.addEventListener("keydown", e => {
  if (e.code === "Space") flap();
});

window.addEventListener("resize", () => {
  setCanvasSize();
  applyPhysicsTuning();

  // Keep bird position valid after iPhone orientation changes.
  bird.x = Math.max(70, Math.min(100, gameWidth * 0.2));
  bird.y = Math.max(bird.size, Math.min(gameHeight - bird.size, bird.y));

  pipes = pipes
    .map(pipe => ({
      ...pipe,
      top: Math.max(40, Math.min(gameHeight - 210, pipe.top)),
      bottom: Math.max(160, Math.min(gameHeight - 40, pipe.bottom))
    }))
    .filter(pipe => pipe.bottom - pipe.top >= 120);
});

function createPipe() {
  const difficulty = Math.min(score, 30);
  const baseGap = Math.max(132, Math.min(190, Math.floor(gameHeight * 0.24)));
  const dynamicGap = Math.max(118, baseGap - difficulty);
  const gap = clamp(dynamicGap * gapMultiplier, 90, Math.floor(gameHeight * 0.7));
  const margin = Math.max(50, Math.floor(gameHeight * 0.1));
  const maxTop = Math.max(margin + 1, gameHeight - gap - margin);
  const topHeight = Math.random() * (maxTop - margin) + margin;

  totalPipesCreated += 1;
  pipes.push({
    id: totalPipesCreated,
    x: gameWidth,
    width: 90,
    top: topHeight,
    bottom: topHeight + gap,
    passed: false
  });
}

function update() {
  if (!gameStarted || gameOver) return;

  maybeExpireEffect();
  maybeQueueMysteryPlans();
  maybeSpawnMysteryBoxFromPlans();

  const difficulty = Math.min(score, 30);
  const pipeSpeed = (2.7 + difficulty * 0.03) * 0.7 * getPipeSpeedMultiplier();
  const spawnSpacing = Math.max(200, 280 - difficulty * 2);

  bird.velocity += bird.gravity;
  bird.y += bird.velocity;

  if (pipes.length === 0 || pipes[pipes.length - 1].x < gameWidth - spawnSpacing) {
    createPipe();
  }

  pipes.forEach(pipe => {
    pipe.x -= pipeSpeed;

    if (!pipe.passed && pipe.x + pipe.width < bird.x) {
      score++;
      pipe.passed = true;
    }

    if (
      Date.now() >= invincibleUntil &&
      bird.x + bird.size > pipe.x &&
      bird.x - bird.size < pipe.x + pipe.width &&
      (bird.y - bird.size < pipe.top || bird.y + bird.size > pipe.bottom)
    ) {
      if (godModeCharges > 0) {
        godModeCharges = 0;
        invincibleUntil = Date.now() + 800;
      } else {
        setGameOver();
      }
    }
  });

  pipes = pipes.filter(pipe => pipe.x + pipe.width > 0);

  if (mysteryBox && mysteryBox.active) {
    mysteryBox.x -= pipeSpeed;
    if (mysteryBox.x + mysteryBox.size < 0) {
      mysteryBox.active = false;
    } else {
      maybeCollectMysteryBox();
    }
  }

  if (bird.y + bird.size > gameHeight || bird.y - bird.size < 0) {
    setGameOver();
  }
}

function drawColumnLabel(text, x, y, width, height) {
  if (height < 36) {
    return;
  }

  const fontFamily = "Impact, Arial Black, sans-serif";
  const maxTextWidth = width * 0.88;
  const maxTextHeight = height * 0.35;
  let fontSize = Math.floor(clamp(Math.min(width * 0.62, maxTextHeight), 16, 56));

  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillStyle = "#0f172a";

  // Shrink until the label fits the column width.
  while (fontSize > 12) {
    ctx.font = "900 " + fontSize + "px " + fontFamily;
    if (ctx.measureText(text).width <= maxTextWidth) {
      break;
    }
    fontSize -= 1;
  }

  ctx.fillText(text, x + width / 2, y + height / 2);
  ctx.textAlign = "left";
  ctx.textBaseline = "alphabetic";
}

function seededNoise(value) {
  const s = Math.sin(value) * 10000;
  return s - Math.floor(s);
}

function drawElectricity(pipe, timeMs) {
  const startY = pipe.top + 2;
  const endY = pipe.bottom - 2;
  const gapHeight = endY - startY;
  if (gapHeight < 28) {
    return;
  }

  const arcCount = 3;
  const segmentCount = 7;

  for (let i = 0; i < arcCount; i += 1) {
    const anchorX = pipe.x + pipe.width * (0.2 + i * 0.3);
    const phase = timeMs * 0.013 + pipe.x * 0.04 + i * 11;
    const jitter = pipe.width * 0.22;
    const flicker = 0.55 + 0.45 * Math.sin(phase * 1.9);

    ctx.beginPath();
    ctx.moveTo(anchorX, startY);

    for (let step = 1; step < segmentCount; step += 1) {
      const t = step / segmentCount;
      const y = startY + gapHeight * t;
      const xJitter = (seededNoise(phase + step * 2.17) - 0.5) * jitter;
      ctx.lineTo(anchorX + xJitter, y);
    }

    ctx.lineTo(anchorX, endY);

    ctx.save();
    ctx.strokeStyle = "rgba(56, 189, 248, " + (0.32 + flicker * 0.28) + ")";
    ctx.lineWidth = 6;
    ctx.shadowColor = "rgba(56, 189, 248, 0.8)";
    ctx.shadowBlur = 12;
    ctx.stroke();

    ctx.strokeStyle = "rgba(224, 242, 254, " + (0.6 + flicker * 0.35) + ")";
    ctx.lineWidth = 2;
    ctx.shadowBlur = 0;
    ctx.stroke();
    ctx.restore();
  }
}

function draw() {
  ctx.clearRect(0, 0, gameWidth, gameHeight);
  const nowMs = performance.now();
  const bottomColumnLabel = getBottomColumnLabel();

  // Pipes
  pipes.forEach(pipe => {
    const gantryHeight = Math.round(clamp(74 * uiScale, 64, 96));

    // Column bodies styled as CT machine structures.
    ctx.fillStyle = "#cbd5e1";
    ctx.fillRect(pipe.x, 0, pipe.width, pipe.top);
    ctx.fillRect(pipe.x, pipe.bottom, pipe.width, gameHeight - pipe.bottom);

    ctx.fillStyle = "#94a3b8";
    ctx.fillRect(pipe.x, pipe.top - 8, pipe.width, 8);
    ctx.fillRect(pipe.x, pipe.bottom, pipe.width, 8);

    drawColumnLabel("CHUB", pipe.x, 0, pipe.width, pipe.top);
    drawColumnLabel(bottomColumnLabel, pipe.x, pipe.bottom, pipe.width, gameHeight - pipe.bottom);

    // Gantry openings at the edge of the playable gap.
    const topGantryY = pipe.top - gantryHeight;
    const bottomGantryY = pipe.bottom;

    if (ctGantryImage.complete && ctGantryImage.naturalWidth > 0) {
      ctx.drawImage(ctGantryImage, pipe.x, topGantryY, pipe.width, gantryHeight);
      ctx.drawImage(ctGantryImage, pipe.x, bottomGantryY, pipe.width, gantryHeight);
    } else {
      ctx.fillStyle = "#64748b";
      ctx.fillRect(pipe.x, topGantryY, pipe.width, gantryHeight);
      ctx.fillRect(pipe.x, bottomGantryY, pipe.width, gantryHeight);

      ctx.fillStyle = "#e2e8f0";
      ctx.fillRect(pipe.x + pipe.width * 0.2, topGantryY + gantryHeight * 0.3, pipe.width * 0.6, gantryHeight * 0.4);
      ctx.fillRect(pipe.x + pipe.width * 0.2, bottomGantryY + gantryHeight * 0.3, pipe.width * 0.6, gantryHeight * 0.4);
    }

    drawElectricity(pipe, nowMs);
  });

  if (mysteryBox && mysteryBox.active) {
    const size = mysteryBox.size;
    const half = size / 2;
    const x = mysteryBox.x - half;
    const y = mysteryBox.y - half;

    ctx.fillStyle = "#f59e0b";
    ctx.fillRect(x, y, size, size);
    ctx.strokeStyle = "#7c2d12";
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y, size, size);

    ctx.fillStyle = "#111827";
    ctx.font = "900 " + Math.round(size * 0.7) + "px Impact, Arial Black, sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("?", mysteryBox.x, mysteryBox.y + 1);
    ctx.textAlign = "left";
    ctx.textBaseline = "alphabetic";
  }

  // Player character (dog image when available, fallback to circle while loading).
  const spriteSize = bird.size * 2;
  const spriteX = bird.x - bird.size;
  const spriteY = bird.y - bird.size;

  const activeSpriteImage = spriteImages[currentSprite] || spriteImages[DEFAULT_DOG_SPRITE];

  if (activeSpriteImage && activeSpriteImage.complete && activeSpriteImage.naturalWidth > 0) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(bird.x, bird.y, bird.size, 0, Math.PI * 2);
    ctx.clip();
    ctx.drawImage(activeSpriteImage, spriteX, spriteY, spriteSize, spriteSize);
    ctx.restore();
  } else {
    ctx.fillStyle = "#facc15";
    ctx.beginPath();
    ctx.arc(bird.x, bird.y, bird.size, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#000";
    ctx.beginPath();
    ctx.arc(bird.x + 8, bird.y - 7, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  // Score
  const scoreFont = Math.round(clamp(34 * uiScale, 28, 42));
  const hudX = Math.round(clamp(22 * uiScale, 18, 32));
  const hudY = Math.round(clamp(56 * uiScale, 46, 70));

  ctx.fillStyle = "#111827";
  ctx.font = "bold " + scoreFont + "px Arial";
  ctx.fillText(score, hudX, hudY);

  if (gameOver) {
    const titleFont = Math.round(clamp(42 * uiScale, 32, 50));
    const bodyFont = Math.round(clamp(24 * uiScale, 19, 30));
    const subTextFont = Math.round(clamp(17 * uiScale, 14, 22));
    const goldFont = Math.round(clamp(30 * uiScale, 24, 38));
    const hintFont = Math.round(clamp(20 * uiScale, 16, 24));

    const currentEntry = lastSavedEntry || {
      name: playerName,
      score,
      playedAt: new Date().toISOString()
    };
    const topScores = getTopScores(3);
    const topEntry = topScores[0] || currentEntry;

    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(0, 0, gameWidth, gameHeight);

    ctx.fillStyle = "white";
    ctx.textAlign = "center";
    ctx.font = "bold " + titleFont + "px Arial";
    ctx.fillText("Game Over", gameWidth / 2, gameHeight / 2 - 40);

    ctx.font = bodyFont + "px Arial";
    ctx.fillText("Score: " + score, gameWidth / 2, gameHeight / 2);

    ctx.font = subTextFont + "px Arial";
    ctx.fillText("Played: " + formatPlayedAt(currentEntry.playedAt), gameWidth / 2, gameHeight / 2 + 30);

    ctx.fillStyle = "#fbbf24";
    ctx.font = "900 " + goldFont + "px Impact, Arial Black, sans-serif";
    ctx.fillText("#1 " + topEntry.name + " - " + topEntry.score, gameWidth / 2, gameHeight / 2 + 68);

    const tableWidth = clamp(gameWidth * 0.9, 300, 760);
    const rowHeight = Math.round(clamp(30 * uiScale, 24, 36));
    const headerHeight = rowHeight;
    const tableRows = 3;
    const tableHeight = headerHeight + rowHeight * tableRows;
    const tableX = (gameWidth - tableWidth) / 2;
    const tableY = gameHeight / 2 + 92;

    ctx.fillStyle = "rgba(15,23,42,0.72)";
    ctx.fillRect(tableX, tableY, tableWidth, tableHeight);
    ctx.strokeStyle = "rgba(255,255,255,0.45)";
    ctx.lineWidth = 1;
    ctx.strokeRect(tableX, tableY, tableWidth, tableHeight);

    const colRank = tableX + tableWidth * 0.09;
    const colUser = tableX + tableWidth * 0.33;
    const colScore = tableX + tableWidth * 0.57;
    const colPlayed = tableX + tableWidth * 0.81;

    ctx.textAlign = "center";
    ctx.fillStyle = "#e2e8f0";
    ctx.font = "700 " + Math.round(clamp(14 * uiScale, 12, 17)) + "px Arial";
    ctx.fillText("Rank", colRank, tableY + headerHeight * 0.66);
    ctx.fillText("User", colUser, tableY + headerHeight * 0.66);
    ctx.fillText("Score", colScore, tableY + headerHeight * 0.66);
    ctx.fillText("Date/Time", colPlayed, tableY + headerHeight * 0.66);

    ctx.strokeStyle = "rgba(255,255,255,0.25)";
    for (let i = 1; i <= tableRows; i += 1) {
      const y = tableY + headerHeight + rowHeight * i;
      ctx.beginPath();
      ctx.moveTo(tableX, y);
      ctx.lineTo(tableX + tableWidth, y);
      ctx.stroke();
    }

    const fallbackRows = topScores.slice();
    while (fallbackRows.length < 3) {
      fallbackRows.push(null);
    }

    fallbackRows.forEach((entry, idx) => {
      const rowCenterY = tableY + headerHeight + rowHeight * idx + rowHeight * 0.66;
      const isTop = idx === 0 && entry;

      ctx.font = (isTop ? "900 " : "700 ") + Math.round(clamp((isTop ? 16 : 14) * uiScale, 12, isTop ? 22 : 18)) + "px Arial";
      ctx.fillStyle = isTop ? "#fbbf24" : "#f8fafc";

      if (!entry) {
        ctx.fillText("-", colRank, rowCenterY);
        ctx.fillText("-", colUser, rowCenterY);
        ctx.fillText("-", colScore, rowCenterY);
        ctx.fillText("-", colPlayed, rowCenterY);
        return;
      }

      ctx.fillText(String(idx + 1), colRank, rowCenterY);
      ctx.fillText(entry.name, colUser, rowCenterY);
      ctx.fillText(String(entry.score), colScore, rowCenterY);
      ctx.fillText(formatPlayedAtShort(entry.playedAt), colPlayed, rowCenterY);
    });

    const hintY = Math.min(gameHeight - 24, tableY + tableHeight + Math.round(clamp(28 * uiScale, 22, 36)));
    ctx.fillStyle = "#ffffff";
    ctx.font = hintFont + "px Arial";
    ctx.fillText("Press Start Game to play again", gameWidth / 2, hintY);
    ctx.textAlign = "left";
  }
}

function restart() {
  startGame();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
